name: Genera PodPutignano
on:
  schedule:
    - cron: '*/15 5-20 * * *'   # ogni 15 min, dalle 7 alle 22 ora italiana (UTC+2 = UTC 5-20)
  workflow_dispatch:              # permette lancio manuale dal sito GitHub

jobs:
  genera:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          sudo apt-get install -y ffmpeg
          pip install --quiet \
            feedparser \
            requests \
            beautifulsoup4 \
            edge-tts

      - name: Genera PodPutignano.mp3
        run: python PodPutignano.py

      - name: Salva PodPutignano.mp3 nel repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pod/PodPutignano.mp3 Lettura.txt
          git diff --cached --quiet || git commit -m "🎙️ aggiornamento $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
