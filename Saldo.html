<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Saldi</title>

<!-- iOS Home Screen icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj4KICA8cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMWExYTJlIi8+CiAgPHRleHQgeD0iOTAiIHk9IjEzMCIgdGV4dC1hbmNob3I9Im1pZGRsZSIKICAgICAgICBmb250LWZhbWlseT0iR2VvcmdpYSxzZXJpZiIgZm9udC1zaXplPSIxMTAiIGZvbnQtd2VpZ2h0PSJib2xkIgogICAgICAgIGZpbGw9IiMyN2FlNjAiPuKCrDwvdGV4dD4KPC9zdmc+">
<meta name="apple-mobile-web-app-title" content="Saldi">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    padding: 24px 16px;
  }

  h1 {
    color: #d0d0e8;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 460px;
  }

  .row-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* ── Carta persona ── */
  .card {
    background: #16213e;
    border: 2px solid var(--accent);
    border-radius: 18px;
    padding: 20px 18px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow:
      0 4px 16px var(--shadow),
      0 1px 4px rgba(0,0,0,.5);
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    cursor: default;
  }
  .card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow:
      0 10px 32px var(--shadow),
      0 4px 12px rgba(0,0,0,.6);
    border-color: color-mix(in srgb, var(--accent) 80%, white);
  }

  .card-name {
    color: var(--accent);
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .card-val {
    color: #ffffff;
    font-size: 1.55rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .minibar-bg {
    width: 100%;
    height: 8px;
    background: #0f3460;
    border-radius: 4px;
    overflow: hidden;
  }
  .minibar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .4s ease;
  }

  /* ── Carta Totale ── */
  .card-total {
    background: #16213e;
    border: 2px solid #27ae60;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 4px 20px #27ae6055,
      0 1px 6px rgba(0,0,0,.5);
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    cursor: default;
  }
  .card-total:hover {
    transform: translateY(-5px) scale(1.015);
    box-shadow:
      0 12px 40px #27ae6088,
      0 4px 14px rgba(0,0,0,.6);
    border-color: color-mix(in srgb, #27ae60 80%, white);
  }

  .total-top {
    padding: 20px 22px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .total-label {
    color: #aaaacc;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: .25em;
    text-transform: uppercase;
  }

  .total-val {
    color: #ffffff;
    font-size: 2.6rem;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Gauge ── */
  .gauge-box {
    background: #0d0d1a;
    border-top: 2px solid #27ae60;
    padding: 14px 18px 18px;
  }

  .gauge-indicator {
    position: relative;
    height: 14px;
    margin-bottom: 4px;
  }
  .gauge-arrow {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    left: 77.94%;
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 12px solid #27ae60;
    filter: drop-shadow(0 0 3px #27ae60);
  }

  .gauge-bar-wrap {
    height: 13px;
    background: #111133;
    border-radius: 7px;
    overflow: hidden;
    position: relative;
  }

  .gauge-seg {
    position: absolute;
    top: 0; bottom: 0;
  }
  .seg-red    { left:0.00%; width:25.00%; background:#c0392b; }
  .seg-yellow { left:25.00%; width:25.00%; background:#d68910; }
  .seg-green  { left:50.00%; width:50.00%; background:#1e8449; }

  .gauge-ticks {
    margin-top: 6px;
    position: relative;
    height: 22px;
  }

  .tick {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    position: absolute;
    transform: translateX(-50%);
  }
  .tick-line {
    width: 1px;
    height: 6px;
    background: #888;
  }
  .tick-label {
    color: #aaaacc;
    font-size: .62rem;
    white-space: nowrap;
  }

  .tick-0   { left: 0.00%; }
  .tick-5k  { left: 25.00%; }
  .tick-10k { left: 50.00%; }
  .tick-max { left: 100%; }

  footer {
    margin-top: 14px;
    color: #aaaacc;
    font-size: .7rem;
    letter-spacing: .08em;
  }
</style>
</head>
<body>

<h1>💰 Situazione Saldi</h1>

<div class="wrapper">

  <div class="row-top">
    
    <div class="card" style="--accent:#27ae60; --accent2:#1e8449; --shadow:#27ae6044;">
      <div class="card-name">Nino</div>
      <div class="card-val">€ 10.753</div>
      <div class="minibar-bg">
        <div class="minibar-fill" style="width:53.8%; background:#27ae60;"></div>
      </div>
    </div>
    <div class="card" style="--accent:#e74c3c; --accent2:#c0392b; --shadow:#e74c3c44;">
      <div class="card-name">Marica</div>
      <div class="card-val">€ 4.835</div>
      <div class="minibar-bg">
        <div class="minibar-fill" style="width:24.2%; background:#e74c3c;"></div>
      </div>
    </div>
  </div>

  <div class="card-total">
    <div class="total-top">
      <div class="total-label">Totale</div>
      <div class="total-val">€ 15.588</div>
    </div>
    <div class="gauge-box">
      <div class="gauge-indicator">
        <div class="gauge-arrow"></div>
      </div>
      <div class="gauge-bar-wrap">
        <div class="gauge-seg seg-red"></div>
        <div class="gauge-seg seg-yellow"></div>
        <div class="gauge-seg seg-green"></div>
      </div>
      <div class="gauge-ticks">
        <div class="tick tick-0"><div class="tick-line"></div><div class="tick-label">0</div></div>
        <div class="tick tick-5k"><div class="tick-line"></div><div class="tick-label">5k</div></div>
        <div class="tick tick-10k"><div class="tick-line"></div><div class="tick-label">10k</div></div>
        <div class="tick tick-max"><div class="tick-line"></div><div class="tick-label">20k</div></div>
      </div>
    </div>
  </div>

</div>

<footer>Aggiornato al 7 marzo 2026</footer>

</body>
</html>
