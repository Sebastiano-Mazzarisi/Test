<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-Gestione - Desktop View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--primary:#2c5530;--primary-light:#3d7a43;--uscite-color:#c0392b;--uscite-bar:#e74c3c;--entrate-color:#1a8a4a;--entrate-bar:#27ae60;--uscite-bar-pastel:#ef9a9a;--entrate-bar-pastel:#a5d6a7;--bg:#e0e0e0;--card-bg:#fff;--text:#212529;--text-light:#6c757d;--border:#dee2e6;--hover:#f1f3f5;--radius:8px;--shadow:0 4px 10px rgba(0,0,0,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.4}
.container{max-width:950px;margin:30px auto;background:#d5d5d5;min-height:90vh;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:15px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 5px rgba(0,0,0,0.15)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header-left{display:flex;align-items:center;gap:10px}
.header h1{font-size:22px;font-weight:700}
.header-sub{font-size:14px;opacity:0.9}
.header-nav{display:flex;gap:5px;margin-top:5px}
.nav-btn{flex:1;padding:6px 10px;border:1px solid rgba(255,255,255,0.4);border-radius:4px;background:rgba(255,255,255,0.25);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center}
.nav-btn:hover{background:rgba(255,255,255,0.4)}
.nav-btn.active{background:#fff9c4;color:var(--primary);border-color:#fff9c4;font-weight:700}
.icon-btn{background:rgba(255,255,255,0.15);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center}
.icon-btn svg{width:20px;height:20px;fill:#fff}
.icon-btn:hover{background:rgba(255,255,255,0.3)}
.back-btn{font-size:20px;padding:0 10px;display:none;margin-right:0;background:none}
.global-search{background:#d5d5d5;padding:10px 20px;border-bottom:1px solid var(--border);position:sticky;top:108px;z-index:90;display:flex;align-items:center;gap:10px}
.search-wrapper{position:relative;flex:1}
.search-count{font-size:14px;font-weight:700;color:#555;white-space:nowrap}
.search-input{width:100%;padding:10px 40px 10px 15px;border:1px solid #ced4da;border-radius:6px;font-size:16px;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(44,85,48,0.15)}
.clear-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;background:#e74c3c;color:#fff;border-radius:50%;text-align:center;line-height:22px;font-weight:bold;font-size:14px;cursor:pointer;display:none;user-select:none}
.global-summary{padding:10px 20px;text-align:center;background:#fff;margin:8px 20px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.gs-container{display:flex;justify-content:center;gap:50px;margin-top:3px}
.gs-box span{font-size:13px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.gs-val{font-size:24px;font-weight:700;font-family:'Consolas',monospace;display:block}
.year-card{margin:8px 20px;background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.year-top{padding:10px 15px;cursor:pointer;transition:background 0.1s}
.year-top:hover{background:var(--hover)}
.year-title{font-size:20px;font-weight:800;color:#000;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
.year-count{font-size:13px;font-weight:600;color:var(--text-light)}
.year-bars{display:flex;gap:4px;height:18px;margin-bottom:8px}
.bar-uscite{background:var(--uscite-bar);height:100%;border-radius:3px;min-width:4px;transition:width 0.3s ease}
.bar-entrate{background:var(--entrate-bar);height:100%;border-radius:3px;min-width:4px;transition:width 0.3s ease}
.year-vals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;font-family:'Consolas',monospace;font-size:14px;font-weight:700}
.year-uscite{color:var(--uscite-color)}
.year-entrate{color:var(--entrate-color)}
.year-saldo{color:var(--text)}
.year-vals-label{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px}
.months-container{max-height:0;overflow:hidden;transition:max-height 0.3s ease;border-top:1px solid var(--border);background:#fafafa}
.months-container.open{max-height:2500px}
.month-row{display:grid;grid-template-columns:70px 1fr 90px 90px 100px;gap:5px;padding:6px 15px 6px 30px;border-bottom:1px solid #eee;align-items:center;cursor:pointer}
.month-row:hover{background:#eef2f3}
.month-name{font-size:14px;font-weight:700;color:#000}
.month-bars{display:flex;gap:2px;height:12px}
.month-bars .bar-uscite{background:var(--uscite-bar-pastel)}
.month-bars .bar-entrate{background:var(--entrate-bar-pastel)}
.month-val{font-size:13px;font-weight:600;text-align:right;font-family:'Consolas',monospace}
.view-detail{display:none;padding-bottom:20px;background:#fff}
.sort-bar{display:grid;grid-template-columns:80px 1fr 110px 110px;gap:5px;padding:18px 6px;background:var(--primary)}
.sort-btn{min-height:36px;border:1px solid rgba(255,255,255,0.4);border-radius:4px;background:rgba(255,255,255,0.25);font-size:13px;cursor:pointer;font-weight:700;text-align:center;color:#fff;display:flex;align-items:center;justify-content:center}
.sort-btn:hover{background:rgba(255,255,255,0.4)}
.sort-btn.active{background:#fff9c4;color:var(--primary)}
.mov-item{display:grid;grid-template-columns:80px 1fr 110px 110px;gap:0;padding:0;border-bottom:1px solid #eee;cursor:pointer;transition:background 0.1s;align-items:center}
.mov-item:hover{background:#eef2f3}
.mov-cell{padding:6px 10px;overflow:hidden;border-right:1px solid #ddd}
.mov-date{font-size:14px;color:var(--text);white-space:nowrap}
.mov-desc{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mov-amount{font-size:14px;font-weight:700;font-family:'Consolas',monospace;text-align:right;padding:6px 10px;white-space:nowrap;border-right:1px solid #ddd}
.mov-amount:last-child{border-right:none}
.mov-uscita{color:var(--uscite-color)}
.mov-entrata{color:var(--entrate-color)}
.mov-totals{display:grid;grid-template-columns:80px 1fr 110px 110px;gap:0;padding:0;background:#f0f0f0;border-top:2px solid #999;font-weight:700}
.mov-totals .mov-cell{font-size:14px;font-weight:700}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-card{background:#fff;border-radius:10px;max-width:550px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,0.25)}
.modal-header{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#f8f9fa}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;padding:0;line-height:1}
.modal-body{padding:20px}
.modal-label{font-size:12px;color:#888;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.modal-value{font-size:16px;margin-bottom:15px;line-height:1.4;color:#333}
.modal-amount{font-size:24px;font-weight:700;margin-bottom:15px;font-family:'Consolas',monospace}
.modal-nav{display:flex;justify-content:space-between;padding:15px 20px;border-top:1px solid var(--border);background:#f8f9fa}
.modal-nav-btn{background:#fff;color:var(--primary);border:1px solid var(--border);border-radius:4px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer}
.modal-nav-btn:hover{background:#e8f5e9;border-color:var(--primary)}
.print-btn{padding:12px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;color:#fff;width:100%;margin-bottom:8px}
.btn-full{background:var(--primary)}.btn-synth{background:#5a7d60}.btn-pano{background:#2c3e50}.btn-cancel{background:#999}
@media print{.header,.global-search,.sort-bar,.modal-overlay{display:none!important}.container{max-width:100%;box-shadow:none;margin:0;background:#fff}body{background:#fff}}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="header-left">
                <button class="icon-btn back-btn" id="backBtn" onclick="goHome()">&#8592;</button>
            </div>
            <div style="text-align:center;flex:1;">
                <h1 style="display:inline;" id="headerTitle">Movimenti</h1> <span class="header-sub" id="headerSub"></span>
            </div>
            <div style="width:30px;"></div>
        </div>
        <div class="header-nav">
            <button class="nav-btn active" data-view="panoramica" onclick="switchView('panoramica')">Panoramica</button>
            <button class="nav-btn" data-view="tutti" onclick="switchView('tutti')">Tutti</button>
            <button class="nav-btn" data-view="stampe" onclick="openPrintModal()">Stampe</button>
        </div>
    </div>
    <div class="global-search">
        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="Cerca in movimenti, anni, importi..." oninput="handleSearchInput()">
            <div class="clear-icon" id="clearBtn" onclick="clearSearch()" title="Cancella tutto">&times;</div>
        </div>
        <span class="search-count" id="searchCount"></span>
    </div>
    <div id="viewPanoramica" style="background:#d5d5d5;padding-bottom:12px;">
        <div id="globalSummary" class="global-summary" style="display:none;"></div>
        <div id="yearCards"></div>
    </div>
    <div id="viewDetail" class="view-detail">
        <div class="sort-bar" id="sortBar">
            <button class="sort-btn active" data-sort="data" onclick="toggleSort('data')">&#8645; Data</button>
            <button class="sort-btn" data-sort="desc" onclick="toggleSort('desc')">&#8645; Descrizione</button>
            <button class="sort-btn" data-sort="uscite" onclick="toggleSort('uscite')">&#8645; Uscite</button>
            <button class="sort-btn" data-sort="entrate" onclick="toggleSort('entrate')">&#8645; Entrate</button>
        </div>
        <div id="movList"></div>
    </div>
    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <div class="modal-header"><div class="modal-label">Dettaglio Movimento</div><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <div class="modal-body">
                <div style="display:flex;justify-content:space-between;">
                    <div><div class="modal-label">Data</div><div class="modal-value" id="modalData"></div></div>
                    <div style="text-align:right;"><div id="modalCounter" style="font-size:11px;color:#999;"></div></div>
                </div>
                <div class="modal-label">Importo</div><div class="modal-amount" id="modalImporto"></div>
                <div class="modal-label">Sintesi</div><div class="modal-value" id="modalSintesi" style="font-weight:700;color:var(--primary);"></div>
                <div class="modal-label">Descrizione Completa</div><div class="modal-value" id="modalDesc" style="background:#f5f5f5;padding:10px;border-radius:6px;font-size:14px;"></div>
            </div>
            <div class="modal-nav">
                <button class="modal-nav-btn" id="modalPrev" onclick="navModal(-1)">&#8592; Prec</button>
                <button class="modal-nav-btn" id="modalNext" onclick="navModal(1)">Succ &#8594;</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="printModal">
        <div class="modal-card" style="max-width:380px;">
            <div class="modal-header"><div class="year-title" style="font-size:18px;">Stampa PDF</div><button class="modal-close" onclick="closePrintModal()">&times;</button></div>
            <div class="modal-body">
                <button class="print-btn btn-full" onclick="printComplete()">Stampa Elenco</button>
                <button class="print-btn btn-synth" onclick="printSynthetic()">Stampa Top 30</button>
                <button class="print-btn btn-pano" onclick="printOverview()">Stampa Panoramica</button>
                <button class="print-btn btn-cancel" onclick="closePrintModal()">Annulla</button>
            </div>
        </div>
    </div>
</div>

var MESI = ['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var state = { view:'panoramica', expandedYear:null, filterYear:null, filterMonth:null, sort:'data-desc', search:'', filteredData:DATA.slice(), modalIndex:-1 };
var $=function(id){return document.getElementById(id);};
function fmtNum(n){var s=n.toString(),r='',c=0;for(var i=s.length-1;i>=0;i--){if(c>0&&c%3===0)r='.'+r;r=s[i]+r;c++;}return r;}
var allYears=DATA.map(function(d){return parseInt(d.anno);});
var minYear=Math.min.apply(null,allYears), maxYear=Math.max.apply(null,allYears);
$('headerTitle').textContent='Movimenti '+minYear+'-'+maxYear;
$('searchCount').textContent='('+fmtNum(DATA.length)+')';
$('headerSub').textContent='';

function fmtMoney(v) {
    var neg=v<0; v=Math.abs(v); var parts=v.toFixed(2).split('.'), intPart=parts[0], result='', count=0;
    for(var i=intPart.length-1;i>=0;i--){if(count>0&&count%3===0)result='.'+result;result=intPart[i]+result;count++;}
    return (neg?'-':'')+result+','+parts[1];
}
function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function parseData(s){var p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function getImp(item){return item.uscite>0?item.uscite:item.entrate;}
function parseImpStr(s){if(!s)return 0;return parseFloat(s.replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,''))||0;}

function handleSearchInput(){
    state.search=$('searchInput').value.trim().toLowerCase();
    $('clearBtn').style.display=state.search.length>0?'block':'none';
    updateGlobalFilter();
    $('searchCount').textContent='('+fmtNum(state.filteredData.length)+')';
    if(state.view==='panoramica')renderPanoramica();else renderList();
}
function clearSearch(){$('searchInput').value='';handleSearchInput();}

function updateGlobalFilter(){
    var items=DATA.slice();
    if(state.search){
        var terms=state.search.split(/\s+/),inc=[],exc=[];
        for(var i=0;i<terms.length;i++){var t=terms[i];if(t.charAt(0)==='-'&&t.length>1)exc.push(t.substring(1));else if(t)inc.push(t);}
        items=items.filter(function(d){
            var txt=(d.descrizione+' '+d.sintesi+' '+d.data+' '+d.anno).toLowerCase()+' '+(d.uscite>0?d.uscite:d.entrate).toFixed(2);
            for(var j=0;j<inc.length;j++)if(txt.indexOf(inc[j])<0)return false;
            for(var j=0;j<exc.length;j++)if(txt.indexOf(exc[j])>=0)return false;
            return true;
        });
    }
    state.filteredData=items;
}

function buildAnniData(items){
    var anni={};
    for(var i=0;i<items.length;i++){
        var d=items[i];
        if(!anni[d.anno])anni[d.anno]={u:0,e:0,n:0,mesi:{}};
        anni[d.anno].u+=d.uscite;anni[d.anno].e+=d.entrate;anni[d.anno].n++;
        var mk=d.mm;
        if(!anni[d.anno].mesi[mk])anni[d.anno].mesi[mk]={u:0,e:0};
        anni[d.anno].mesi[mk].u+=d.uscite;anni[d.anno].mesi[mk].e+=d.entrate;
    }
    return anni;
}

function renderPanoramica(){
    $('globalSummary').style.display='block';
    var items=state.filteredData, tU=0, tE=0;
    for(var i=0;i<items.length;i++){tU+=items[i].uscite;tE+=items[i].entrate;}
    var anni=buildAnniData(items);
    var sG=tE-tU, sGC=sG>=0?'var(--entrate-color)':'var(--uscite-color)', sGS=sG>=0?'+':'';
    $('globalSummary').innerHTML='<div class="gs-container">'
        +'<div class="gs-box"><span style="color:var(--uscite-color)">USCITE</span><span class="gs-val" style="color:var(--uscite-color)">'+fmtMoney(tU)+'</span></div>'
        +'<div class="gs-box"><span style="color:var(--entrate-color)">ENTRATE</span><span class="gs-val" style="color:var(--entrate-color)">'+fmtMoney(tE)+'</span></div>'
        +'<div class="gs-box"><span style="color:#666">SALDO</span><span class="gs-val" style="color:'+sGC+'">'+sGS+fmtMoney(sG)+'</span></div></div>';

    var maxA=0, keys=Object.keys(anni);
    if(!keys.length){$('yearCards').innerHTML='<div style="text-align:center;padding:40px;color:#999;">Nessun movimento corrisponde alla ricerca.</div>';return;}
    for(var i=0;i<keys.length;i++)maxA=Math.max(maxA,anni[keys[i]].u,anni[keys[i]].e);
    var sa=keys.sort(function(a,b){return b-a;}), html='';

    for(var i=0;i<sa.length;i++){
        var anno=sa[i], a=anni[anno], saldo=a.e-a.u, sPfx=saldo>=0?'+':'';
        var sClr=saldo>=0?'var(--entrate-color)':'var(--uscite-color)';
        var pU=maxA>0?(a.u/maxA*100):0, pE=maxA>0?(a.e/maxA*100):0, isO=state.expandedYear===anno;
        var maxM=0, mks=Object.keys(a.mesi);
        for(var j=0;j<mks.length;j++)maxM=Math.max(maxM,a.mesi[mks[j]].u,a.mesi[mks[j]].e);

        var mH='';
        for(var mi=1;mi<=12;mi++){
            var mk=mi<10?'0'+mi:''+mi, md=a.mesi[mk];
            if(!md) md={u:0,e:0};
            var mU=maxM>0?(md.u/maxM*100):0, mE=maxM>0?(md.e/maxM*100):0;
            var saldoM=md.e-md.u, smPfx=saldoM>=0?'+':'', smClr=saldoM>=0?'var(--entrate-color)':'var(--uscite-color)';
            mH+='<div class="month-row" onclick="goDetail(\x27'+anno+'\x27,\x27'+mk+'\x27)">'
                +'<div class="month-name">'+MESI[mi].substring(0,3)+'</div>'
                +'<div><div class="month-bars"><div class="bar-uscite" style="width:'+mU+'%"></div><div class="bar-entrate" style="width:'+mE+'%"></div></div></div>'
                +'<div class="month-val mov-uscita">'+(md.u>0?fmtMoney(md.u):'-')+'</div>'
                +'<div class="month-val mov-entrata">'+(md.e>0?fmtMoney(md.e):'-')+'</div>'
                +'<div class="month-val" style="color:'+smClr+'">'+smPfx+fmtMoney(saldoM)+'</div>'
                +'</div>';
        }

        html+='<div class="year-card">'
            +'<div class="year-top" onclick="toggleYear(\x27'+anno+'\x27)">'
            +'<div class="year-title"><span>'+anno+'</span><span class="year-count">('+fmtNum(a.n)+')</span></div>'
            +'<div class="year-bars"><div class="bar-uscite" style="width:'+pU+'%"></div><div class="bar-entrate" style="width:'+pE+'%"></div></div>'
            +'<div class="year-vals">'
            +'<div><div class="year-vals-label">Uscite</div><div class="year-uscite">'+fmtMoney(a.u)+'</div></div>'
            +'<div><div class="year-vals-label">Entrate</div><div class="year-entrate">'+fmtMoney(a.e)+'</div></div>'
            +'<div><div class="year-vals-label">Saldo</div><div class="year-saldo" style="color:'+sClr+'">'+sPfx+fmtMoney(saldo)+'</div></div>'
            +'</div></div>'
            +'<div class="months-container'+(isO?' open':'')+'" id="months-'+anno+'">'+mH+'</div></div>';
    }
    $('yearCards').innerHTML=html;
}

function toggleYear(anno){
    state.expandedYear=state.expandedYear===anno?null:anno;
    var els=document.querySelectorAll('.months-container');
    for(var i=0;i<els.length;i++)els[i].classList.remove('open');
    if(state.expandedYear){var el=$('months-'+anno);if(el)el.classList.add('open');}
}
function goDetail(anno,mese){state.filterYear=anno;state.filterMonth=mese;showDetailView();}

function showDetailView(){
    $('viewPanoramica').style.display='none';$('globalSummary').style.display='none';
    $('viewDetail').style.display='block';$('backBtn').style.display='block';
    var title='Movimenti';
    if(state.filterYear&&state.filterMonth)title=MESI[parseInt(state.filterMonth)]+' '+state.filterYear;
    else if(state.filterYear)title='Anno '+state.filterYear;
    $('headerTitle').textContent=title;renderList();
}

function goHome(){
    $('viewPanoramica').style.display='block';$('viewDetail').style.display='none';
    $('backBtn').style.display='none';$('headerTitle').textContent='Movimenti '+minYear+'-'+maxYear;
    $('headerSub').textContent='';
    $('searchCount').textContent='('+fmtNum(state.filteredData.length)+')';
    state.view='panoramica';state.filterYear=null;state.filterMonth=null;
    renderPanoramica();updateNav();window.scrollTo(0,0);
}

function switchView(view){
    if(view==='stampe')return;
    state.view=view;updateNav();
    if(view==='panoramica'){goHome();return;}
    state.filterYear=null;state.filterMonth=null;
    state.sort='data-desc';
    showDetailView();
    $('headerTitle').textContent='Movimenti '+minYear+'-'+maxYear;
}

function updateNav(){
    var b=document.querySelectorAll('.nav-btn');
    for(var i=0;i<b.length;i++){
        var v=b[i].getAttribute('data-view');
        b[i].classList.toggle('active',v===state.view);
    }
}

function toggleSort(col){
    var cur=state.sort;
    if(cur===col+'-desc')state.sort=col+'-asc';
    else state.sort=col+'-desc';
    var btns=document.querySelectorAll('#sortBar .sort-btn');
    for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
    var active=document.querySelector('#sortBar .sort-btn[data-sort="'+col+'"]');
    if(active)active.classList.add('active');
    renderList();
}

function renderList(){
    var items=state.filteredData.slice();
    if(state.filterYear){
        items=items.filter(function(d){return d.anno===state.filterYear;});
        if(state.filterMonth)items=items.filter(function(d){return d.mm===state.filterMonth;});
    }
    items.sort(function(a,b){
        if(state.sort==='data-desc')return parseData(b.data)-parseData(a.data);
        if(state.sort==='data-asc')return parseData(a.data)-parseData(b.data);
        if(state.sort==='desc-desc')return b.descrizione.localeCompare(a.descrizione,'it');
        if(state.sort==='desc-asc')return a.descrizione.localeCompare(b.descrizione,'it');
        if(state.sort==='uscite-desc')return b.uscite-a.uscite;
        if(state.sort==='uscite-asc')return a.uscite-b.uscite;
        if(state.sort==='entrate-desc')return b.entrate-a.entrate;
        if(state.sort==='entrate-asc')return a.entrate-b.entrate;
        return 0;
    });
    state.currentList=items;
    $('searchCount').textContent='('+fmtNum(items.length)+')';
    var html='', totU=0, totE=0;
    for(var i=0;i<items.length;i++){
        var d=items[i];
        totU+=d.uscite;totE+=d.entrate;
        var mainText=d.sintesi&&d.sintesi.trim()!==''?d.sintesi:d.descrizione;
        var shortYear=d.anno.substring(2);
        html+='<div class="mov-item" onclick="openModal('+i+')">'
            +'<div class="mov-cell"><div class="mov-date">'+d.gg+'/'+d.mm+'/'+shortYear+'</div></div>'
            +'<div class="mov-cell"><div class="mov-desc">'+escH(mainText)+'</div></div>'
            +'<div class="mov-amount mov-uscita">'+(d.uscite>0?fmtMoney(d.uscite):'')+'</div>'
            +'<div class="mov-amount mov-entrata">'+(d.entrate>0?fmtMoney(d.entrate):'')+'</div>'
            +'</div>';
    }
    if(items.length>0){
        var saldo=totE-totU,sPfx=saldo>=0?'+':'',sClr=saldo>=0?'var(--entrate-color)':'var(--uscite-color)';
        html+='<div class="mov-totals">'
            +'<div class="mov-cell"></div>'
            +'<div class="mov-cell" style="text-align:right;color:'+sClr+'">Saldo: '+sPfx+fmtMoney(saldo)+'</div>'
            +'<div class="mov-amount mov-uscita">'+fmtMoney(totU)+'</div>'
            +'<div class="mov-amount mov-entrata">'+fmtMoney(totE)+'</div>'
            +'</div>';
    }
    $('movList').innerHTML=html||'<div style="padding:30px;text-align:center;color:#999;">Nessun risultato.</div>';
}

function openModal(idx){
    state.modalIndex=idx;var d=state.currentList[idx],isU=d.uscite>0,imp=isU?d.uscite:d.entrate;
    $('modalCounter').textContent=(idx+1)+' / '+state.currentList.length;
    $('modalData').textContent=d.data;
    var el=$('modalImporto');el.textContent=(isU?'- ':'+ ')+'\u20AC '+fmtMoney(imp);el.style.color=isU?'var(--uscite-color)':'var(--entrate-color)';
    $('modalSintesi').textContent=d.sintesi||'(Nessuna sintesi)';$('modalDesc').textContent=d.descrizione;
    $('modalPrev').disabled=idx===0;$('modalNext').disabled=idx===state.currentList.length-1;
    $('modal').classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){$('modal').classList.remove('open');document.body.style.overflow='auto';}
function navModal(step){var n=state.modalIndex+step;if(n>=0&&n<state.currentList.length)openModal(n);}
function openPrintModal(){$('printModal').classList.add('open');}
function closePrintModal(){$('printModal').classList.remove('open');}

function printElenco(title, items, addGrouping, sortFn){
    closePrintModal();
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    var sorted=items.slice().sort(sortFn);
    doc.setFontSize(14);doc.text(title+" - "+$('headerTitle').textContent,12,12);
    doc.setFontSize(10);doc.text("Filtro ricerca: "+(state.search||"Nessuno"),12,17);

    var rows=[], rowMeta=[];
    var curMonth=null, curYear=null;
    var mU=0, mE=0, yU=0, yE=0, gU=0, gE=0;

    function summaryLabel(prefix,u,e){var s=e-u;return prefix+' - Uscite: '+fmtMoney(u)+' - Entrate: '+fmtMoney(e)+' - Saldo: '+(s>=0?'+':'')+fmtMoney(s);}
    function pushMonthRow(){
        if(curMonth===null)return;
        rows.push([{content:summaryLabel(MESI[parseInt(curMonth)]+' '+curYear,mU,mE),colSpan:4,styles:{halign:'center',fillColor:[225,225,225],fontSize:8,cellPadding:2,lineColor:[0,0,0],lineWidth:0.3}}]);
        rowMeta.push('month');
    }
    function pushYearRow(){
        if(curYear===null)return;
        rows.push([{content:summaryLabel('Anno '+curYear,yU,yE),colSpan:4,styles:{halign:'center',fontStyle:'bold',fillColor:[255,249,196],fontSize:12,cellPadding:4,lineColor:[0,0,0],lineWidth:0.3}}]);
        rowMeta.push('year');
    }

    for(var i=0;i<sorted.length;i++){
        var d=sorted[i];
        if(addGrouping){
            if(curYear!==null && d.anno!==curYear){pushMonthRow();pushYearRow();mU=0;mE=0;yU=0;yE=0;curMonth=null;}
            else if(curMonth!==null && d.mm!==curMonth){pushMonthRow();mU=0;mE=0;}
            curMonth=d.mm;curYear=d.anno;
            mU+=d.uscite;mE+=d.entrate;yU+=d.uscite;yE+=d.entrate;
        }
        gU+=d.uscite;gE+=d.entrate;
        rows.push([d.data,d.sintesi||d.descrizione.substring(0,40),d.uscite>0?fmtMoney(d.uscite):'',d.entrate>0?fmtMoney(d.entrate):'']);
        rowMeta.push('data');
    }
    if(sorted.length>0){
        if(addGrouping){pushMonthRow();pushYearRow();}
        var gs=gE-gU;
        rows.push([{content:'TOTALE GENERALE - Uscite: '+fmtMoney(gU)+' - Entrate: '+fmtMoney(gE)+' - Saldo: '+(gs>=0?'+':'')+fmtMoney(gs),colSpan:4,styles:{halign:'center',fontStyle:'bold',fillColor:[230,230,230],textColor:[0,0,0],fontSize:10,cellPadding:3,lineColor:[0,0,0],lineWidth:0.3}}]);
        rowMeta.push('total');
    }

    var arrow=state.sort.endsWith('-asc')?' (asc)':' (desc)';
    var sortCol=state.sort.replace(/-asc$/,'').replace(/-desc$/,'');
    var hData='Data'+(sortCol==='data'?arrow:'');
    var hMov='Movimento'+(sortCol==='desc'?arrow:'');
    var hUsc='Uscite'+(sortCol==='uscite'?arrow:'');
    var hEnt='Entrate'+(sortCol==='entrate'?arrow:'');

    doc.autoTable({startY:20,margin:{top:12,bottom:12,left:12,right:12},
        head:[[hData,hMov,hUsc,hEnt]],body:rows,
        theme:'grid',tableLineColor:[0,0,0],tableLineWidth:0.1,
        headStyles:{fillColor:[220,220,220],textColor:[0,0,0],fontStyle:'bold'},
        styles:{fontSize:8,cellPadding:2},
        columnStyles:{0:{cellWidth:22},1:{overflow:'ellipsize'},2:{halign:'right',fontStyle:'bold',textColor:[192,57,43],cellWidth:25},3:{halign:'right',fontStyle:'bold',textColor:[39,174,96],cellWidth:25}}
    });
    window.open(doc.output('bloburl'),'_blank');
}

function getSortFn(){
    return function(a,b){
        if(state.sort==='data-desc')return parseData(b.data)-parseData(a.data);
        if(state.sort==='data-asc')return parseData(a.data)-parseData(b.data);
        if(state.sort==='desc-desc')return b.descrizione.localeCompare(a.descrizione,'it');
        if(state.sort==='desc-asc')return a.descrizione.localeCompare(b.descrizione,'it');
        if(state.sort==='uscite-desc')return b.uscite-a.uscite;
        if(state.sort==='uscite-asc')return a.uscite-b.uscite;
        if(state.sort==='entrate-desc')return b.entrate-a.entrate;
        if(state.sort==='entrate-asc')return a.entrate-b.entrate;
        return 0;
    };
}

function printComplete(){
    var items=(state.view==='panoramica')?state.filteredData:state.currentList;
    var doGroup=items.length>=100&&(state.sort==='data-desc'||state.sort==='data-asc');
    printElenco("Report Fideuram",items,doGroup,getSortFn());
}
function printSynthetic(){
    var items=(state.view==='panoramica')?state.filteredData:state.currentList;
    printElenco("Sintesi Top 30",items.slice().sort((a,b)=>getImp(b)-getImp(a)).slice(0,30),false,getSortFn());
}

function printOverview(){
    closePrintModal();
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    var anni=buildAnniData(state.filteredData);
    doc.setFontSize(16);doc.text("Panoramica Grafica Completa",12,12);
    doc.setFontSize(10);doc.text("Filtro: "+(state.search||"Tutti"),12,17);
    var yPos=20, keys=Object.keys(anni).sort((a,b)=>b-a), yearsOnPage=0, totalGlobalU=0, totalGlobalE=0;

    keys.forEach(function(anno){
        var a=anni[anno], saldo=a.e-a.u;
        totalGlobalU+=a.u;totalGlobalE+=a.e;
        if(!state.search){if(yearsOnPage===2){doc.addPage();yearsOnPage=0;yPos=12;}}
        else{if(yPos>250){doc.addPage();yPos=12;}}
        var maxM=0,mks=Object.keys(a.mesi);
        mks.forEach(function(k){maxM=Math.max(maxM,a.mesi[k].u,a.mesi[k].e);});
        var rows=[];
        for(var mi=1;mi<=12;mi++){
            var mk=mi<10?'0'+mi:''+mi,md=a.mesi[mk];if(!md)continue;
            var salM=md.e-md.u,smPfx=salM>=0?'+':'';
            rows.push([MESI[mi],"",(md.u>0?fmtMoney(md.u):""),(md.e>0?fmtMoney(md.e):""),smPfx+fmtMoney(salM)]);
        }
        var sPfx=saldo>=0?'+':'';
        rows.push(["TOTALE "+anno,"",fmtMoney(a.u),fmtMoney(a.e),sPfx+fmtMoney(saldo)]);
        doc.autoTable({startY:yPos,margin:{top:12,bottom:12,left:12,right:12},
            head:[[anno,"Grafico Mese","Uscite","Entrate","Saldo"]],body:rows,
            theme:'grid',tableLineColor:[0,0,0],tableLineWidth:0.1,headStyles:{fillColor:[44,62,80]},
            columnStyles:{0:{cellWidth:35},1:{cellWidth:61},2:{cellWidth:30,halign:'right'},3:{cellWidth:30,halign:'right'},4:{cellWidth:30,halign:'right'}},
            didParseCell:function(data){
                if(data.section==='body'){
                    var txt=data.row.raw[0].toString();
                    if(txt.startsWith("TOTALE")){data.cell.styles.fontStyle='bold';data.cell.styles.fillColor=[240,240,240];}
                    if(data.column.index===2)data.cell.styles.textColor=[192,57,43];
                    if(data.column.index===3)data.cell.styles.textColor=[39,174,96];
                    if(data.column.index===4){var val=parseImpStr(data.cell.raw);if(val<0)data.cell.styles.textColor=[192,57,43];else data.cell.styles.textColor=[39,174,96];}
                }
            },
            didDrawCell:function(data){
                if(data.section==='body'&&data.column.index===1){
                    if(data.row.raw[0].startsWith("TOTALE"))return;
                    var rawU=data.row.raw[2],rawE=data.row.raw[3],valU=parseImpStr(rawU),valE=parseImpStr(rawE);
                    var cell=data.cell,barH=1.75,gap=1,padding=2,maxW=cell.width-(padding*2);
                    if(valU>0&&maxM>0){doc.setFillColor(239,154,154);doc.rect(cell.x+padding,cell.y+(cell.height/2)-barH,(valU/maxM)*maxW,barH,'F');}
                    if(valE>0&&maxM>0){doc.setFillColor(165,214,167);doc.rect(cell.x+padding,cell.y+(cell.height/2)+gap,(valE/maxM)*maxW,barH,'F');}
                }
            }
        });
        yPos=doc.lastAutoTable.finalY+10;yearsOnPage++;
    });

    if(yPos>250){doc.addPage();yPos=12;}
    var globalS=totalGlobalE-totalGlobalU, gsPfx=globalS>=0?'+':'';
    doc.autoTable({startY:yPos,margin:{top:12,bottom:12,left:12,right:12},
        body:[['TOTALI GENERALI','',fmtMoney(totalGlobalU),fmtMoney(totalGlobalE),gsPfx+fmtMoney(globalS)]],
        theme:'grid',tableLineColor:[0,0,0],tableLineWidth:0.1,styles:{fontStyle:'bold',fontSize:10,fillColor:[230,230,230]},
        columnStyles:{0:{cellWidth:35},1:{cellWidth:61},2:{cellWidth:30,halign:'right',textColor:[192,57,43]},3:{cellWidth:30,halign:'right',textColor:[39,174,96]},4:{cellWidth:30,halign:'right'}},
        didParseCell:function(data){if(data.section==='body'&&data.column.index===4){var val=parseImpStr(data.cell.raw);if(val<0)data.cell.styles.textColor=[192,57,43];else data.cell.styles.textColor=[39,174,96];}}
    });

    doc.addPage();yPos=20;
    var maxValYear=0;keys.forEach(k=>{maxValYear=Math.max(maxValYear,anni[k].u,anni[k].e);});
    doc.setFontSize(14);doc.text("Andamento Annuale (Uscite vs Entrate)",12,yPos);yPos+=5;
    var pageWidth=doc.internal.pageSize.width||210,margin=12,startX=40,endX=pageWidth-margin,chartW=endX-startX;
    var barH=2.5,gapY=15,totalH=keys.length*gapY;
    doc.setDrawColor(0);doc.setLineWidth(0.1);
    doc.line(margin,yPos,endX,yPos);doc.line(margin,yPos+totalH,endX,yPos+totalH);
    doc.line(margin,yPos,margin,yPos+totalH);doc.line(endX,yPos,endX,yPos+totalH);doc.line(startX,yPos,startX,yPos+totalH);
    for(var j=1;j<keys.length;j++){doc.line(margin,yPos+(j*gapY),endX,yPos+(j*gapY));}
    keys.forEach(k=>{
        var u=anni[k].u,e=anni[k].e,wU=(u/maxValYear)*(chartW-40),wE=(e/maxValYear)*(chartW-40);
        doc.setFontSize(12);doc.setTextColor(0,0,0);doc.text(k,margin+2,yPos+8);
        doc.setFillColor(239,154,154);doc.rect(startX+2,yPos+3,wU,barH,'F');doc.setFontSize(9);doc.text(fmtMoney(u),startX+wU+4,yPos+5);
        doc.setFillColor(165,214,167);doc.rect(startX+2,yPos+7,wE,barH,'F');doc.setTextColor(0,0,0);doc.text(fmtMoney(e),startX+wE+4,yPos+9);
        yPos+=gapY;
    });

    yPos+=10;var matU=0,matE=0;
    var matrixRows=keys.map(k=>{var sal=anni[k].e-anni[k].u;matU+=anni[k].u;matE+=anni[k].e;return[k,fmtMoney(anni[k].u),fmtMoney(anni[k].e),(sal>=0?'+':'')+fmtMoney(sal)];});
    var matSal=matE-matU;matrixRows.push(['TOTALI',fmtMoney(matU),fmtMoney(matE),(matSal>=0?'+':'')+fmtMoney(matSal)]);
    doc.autoTable({startY:yPos,margin:{top:12,bottom:12,left:12,right:12},
        head:[['Anno','Uscite','Entrate','Saldo']],body:matrixRows,
        theme:'grid',tableLineColor:[0,0,0],tableLineWidth:0.1,headStyles:{fillColor:[44,62,80]},
        columnStyles:{0:{halign:'center',fontStyle:'bold'},1:{halign:'right',textColor:[192,57,43]},2:{halign:'right',textColor:[39,174,96]},3:{halign:'right'}},
        didParseCell:function(data){
            if(data.section==='body'){
                if(data.row.index===matrixRows.length-1){data.cell.styles.fontStyle='bold';data.cell.styles.fillColor=[240,240,240];}
                if(data.column.index===3){var val=parseImpStr(data.cell.raw);if(val<0)data.cell.styles.textColor=[192,57,43];else data.cell.styles.textColor=[39,174,96];}
            }
        }
    });
    window.open(doc.output('bloburl'),'_blank');
}

document.addEventListener('keydown',function(e){
    if($('modal').classList.contains('open')){if(e.key==='ArrowRight')navModal(1);if(e.key==='ArrowLeft')navModal(-1);if(e.key==='Escape')closeModal();}
});
$('modal').addEventListener('click',function(e){if(e.target===$('modal')||e.target===$('printModal')){closeModal();closePrintModal();}});
renderPanoramica();
</script>
