<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bilancio Familiare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
:root{
    /* THEME: MIDNIGHT SLATE */
    --bg:#1e293b;
    --c1:#334155;
    --c2:#475569;
    --bd:#475569;
    --tx:#f1f5f9;
    --m1:#cbd5e1;
    --gn:#34d399;
    --rd:#f87171;
    --bl:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);max-width:600px;margin:0 auto;padding-bottom:60px}

.sticky-header {position:sticky;top:0;z-index:100;background:rgba(30,41,59,0.95);backdrop-filter:blur(8px);padding:10px 16px;border-bottom:1px solid var(--bd);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
.yrs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.yr{padding:8px 16px;border-radius:20px;font-size:15px;font-weight:700;background:var(--c2);color:var(--m1);white-space:nowrap;cursor:pointer;border:1px solid var(--bd);transition:background .2s}
.yr.a{background:var(--bl);color:#fff;border-color:var(--bl)}

.hero{margin:16px;background:linear-gradient(135deg, var(--c1), var(--c2));border:1px solid var(--bd);border-radius:20px;padding:24px;text-align:center;box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
.hero-val{font-size:40px;font-weight:800;margin:5px 0;letter-spacing:-1px}
.hero-sub{font-size:14px;color:var(--m1)}
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px 16px}
.kpi{background:var(--c1);border:1px solid var(--bd);border-radius:20px;padding:20px 10px;text-align:center}
.kpi-val{font-size:26px;font-weight:800;margin:5px 0}
.kpi-label{font-size:12px;color:var(--m1);font-weight:600;text-transform:uppercase}

.tbl-card {margin:16px;background:var(--c1);border:1px solid var(--bd);border-radius:16px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
.tbl {width:100%;border-collapse:collapse}
.tbl th {background:var(--c2);color:var(--tx);font-weight:600;padding:12px;text-align:right;font-size:14px;text-transform:uppercase}
.tbl td {padding:14px 12px;text-align:right;border-bottom:1px solid var(--bd);font-size:17px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--tx)}
.tbl tr:last-child td {border-bottom:none;font-weight:800;background:rgba(255,255,255,0.05)}
.tbl-m {text-align:left!important;font-weight:700;color:var(--m1)}

.vchart{background:var(--c1);border:1px solid var(--bd);border-radius:20px;padding:20px;margin:16px}
.vbars{display:flex;align-items:flex-end;gap:5px;height:200px;margin-top:20px}
.vbar-g{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.vbar-pair{display:flex;gap:3px;align-items:flex-end;height:100%;width:100%}
.vbar{border-radius:4px 4px 0 0;flex:1;min-width:6px}
.vbar-lbl{font-size:11px;margin-top:8px;color:var(--m1);font-weight:600}

.card{background:var(--c1);border:1px solid var(--bd);border-radius:20px;padding:16px;margin:16px}
.hbar-row{padding:14px 0;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}
.hbar-row:last-child{border:none}
.hbar-top{display:flex;align-items:baseline;justify-content:space-between;width:100%}
.hbar-name{font-size:16px;font-weight:600;color:var(--tx);flex:1;margin-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-row .hbar-name { white-space: normal; overflow: visible; text-overflow: clip; }
.hbar-val{font-size:16px;font-weight:700;color:var(--tx);flex-shrink:0}
.hbar-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;width:100%}
.hbar-fill{height:100%;border-radius:4px}

.donut-box{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;padding:10px}
.donut-ring{position:relative;width:120px;height:120px;flex-shrink:0}
.donut-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--tx)}
.donut-leg{display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px}

.sec{font-size:18px;font-weight:800;margin:30px 16px 10px;padding-left:4px;color:var(--tx)}
</style></head><body>

<div class="sticky-header">
    <div class="yrs" id="yrs"></div>
    <div id="mini-status" style="display:none; text-align:center; font-size:13px; font-weight:800; margin-top:8px; color:var(--bl)"></div>
</div>

<div id="content"></div>

03/03/25", "v": 17474, "n": "Interessi debitori", "c": "Interessi Debitori", "mc": "FISSE"}, {"d": "12/06/25", "v": 6944, "n": "@M Bonifico da Voi disposto a favore di Iris Mobil", "c": "Arredamento", "mc": "STRAORD"}, {"d": "20/11/25", "v": 5000, "n": "Bonifico da Voi disposto a favore di Emmeci Auto S", "c": "Acquisto Auto", "mc": "STRAORD"}, {"d": "15/06/25", "v": 4286, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/08/25", "v": 4022, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "20/08/25", "v": 3097, "n": "Add. deleghe Fisco/Inps/Regioni", "c": "F24 / Tasse", "mc": "FISSE"}, {"d": "15/05/25", "v": 3011, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/02/25", "v": 2875, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/10/25", "v": 2301, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/12/25", "v": 2278, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/01/25", "v": 2221, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/04/25", "v": 1858, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "15/07/25", "v": 1767, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}, {"d": "01/12/25", "v": 1631, "n": "Add. deleghe Fisco/Inps/Regioni", "c": "F24 / Tasse", "mc": "FISSE"}, {"d": "15/09/25", "v": 1589, "n": "Addebito saldo e/c carta di credito", "c": "Carta di Credito", "mc": "TRASF"}]}}; const MM={"FISSE": {"icon": "📋", "label": "Spese Fisse", "color": "#ef4444"}, "ALIM": {"icon": "🛒", "label": "Alimentari", "color": "#3b82f6"}, "FUORI": {"icon": "🍽️", "label": "Ristoranti", "color": "#f59e0b"}, "SALUTE": {"icon": "💊", "label": "Salute", "color": "#10b981"}, "PERSONA": {"icon": "👗", "label": "Persona", "color": "#d946ef"}, "SVAGO": {"icon": "🎯", "label": "Svago", "color": "#f97316"}, "TRASP": {"icon": "🚗", "label": "Trasporti", "color": "#0ea5e9"}, "ONLINE": {"icon": "🌐", "label": "Online", "color": "#8b5cf6"}, "FAMIGLIA": {"icon": "👨‍👩‍👧", "label": "Famiglia", "color": "#ec4899"}, "TRASF": {"icon": "🔄", "label": "Trasferimenti", "color": "#64748b"}, "STRAORD": {"icon": "⭐", "label": "Straordinarie", "color": "#eab308"}}; const ME={"REDDITO": {"icon": "💰", "label": "Reddito", "color": "#10b981"}, "EXTRA": {"icon": "💎", "label": "Extra", "color": "#06b6d4"}};
const MN=['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
let cy=D.ac;

// FUNZIONE CRUCIALE: Forza i punti millesimali con Regex, ignorando il locale del browser
const fm = n => {
    if (n === undefined || n === null) return '0';
    // Arrotonda e converte in stringa
    let s = Math.round(n).toString();
    // Regex che inserisce il punto ogni 3 cifre
    return s.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
};

function sel(y){ cy=y; render(); window.scrollTo(0,0); }

window.onscroll = function() {
    let ms = document.getElementById('mini-status');
    if (window.scrollY > 300) {
        let d = D.pya[cy];
        ms.style.display = 'block';
        ms.innerHTML = `Saldo ${cy}: € ${fm(d.s)}`;
    } else {
        ms.style.display = 'none';
    }
};

function render(){
  document.getElementById('yrs').innerHTML=D.anni.map(a=>
    `<div class="yr ${cy===a?'a':''}" onclick="sel(${a})">${a}</div>`).join('');
  
  const el=document.getElementById('content');
  const d=D.pya[cy];
  let h='';

  // 1. HERO & KPI (PRIMA POSIZIONE)
  h+=`<div class="hero">
    <div style="font-size:13px;text-transform:uppercase;color:var(--m1)">Saldo Anno ${cy}</div>
    <div class="hero-val" style="color:${d.s>=0?'var(--bl)':'var(--rd)'}">€ ${fm(d.s)}</div>
    <div class="hero-sub">Media: € ${fm(d.s/d.nm)} / mese</div>
  </div>`;
  h+=`<div class="kpi2">
    <div class="kpi"><div class="kpi-label">Entrate</div><div class="kpi-val" style="color:var(--gn)">€ ${fm(d.e)}</div></div>
    <div class="kpi"><div class="kpi-label">Uscite</div><div class="kpi-val" style="color:var(--rd)">€ ${fm(d.u)}</div></div>
  </div>`;

  // 2. TABELLA CONFRONTO (SECONDA POSIZIONE, SOTTO HERO)
  const py = cy - 1;
  const hasPrev = D.anni.includes(py);
  
  h+=`<div class="sec">📅 Confronto Uscite</div>`;
  h+=`<div class="tbl-card"><table class="tbl">
      <thead><tr><th class="tbl-m">Mese</th><th>${py}</th><th>${cy}</th></tr></thead>
      <tbody>`;
  let totC=0, totP=0;
  for(let i=1; i<=12; i++){
      const kC = cy + '-' + (i<10?'0'+i:i);
      const kP = py + '-' + (i<10?'0'+i:i);
      const vC = (D.pm[kC]||{}).u || 0;
      const vP = hasPrev ? ((D.pm[kP]||{}).u || 0) : 0;
      
      // Salta solo se entrambi zero E siamo oltre l'ultimo mese registrato
      if(vC===0 && vP===0 && i > D.um) continue; 
      
      totC+=vC; totP+=vP;
      
      let col = 'var(--tx)';
      // Logica colori: Rosso se spendi di più dell'anno scorso, altrimenti normale
      if(vC > 0 && vP > 0) { col = vC > vP ? 'var(--rd)' : 'var(--tx)'; }
      
      h+=`<tr><td class="tbl-m">${MN[i-1]}</td>
        <td style="color:var(--m1)">${vP?'€ '+fm(vP):'-'}</td>
        <td style="color:${col}">${vC?'€ '+fm(vC):'-'}</td></tr>`;
  }
  h+=`<tr><td class="tbl-m">TOTALE</td>
      <td style="color:var(--m1)">€ ${fm(totP)}</td>
      <td style="color:var(--bl)">€ ${fm(totC)}</td></tr></tbody></table></div>`;

  // 3. GRAFICI E ALTRO
  h+=`<div class="sec">📈 Andamento Mensile</div>
    <div class="vchart">
      <div style="display:flex;gap:15px;font-size:12px;margin-bottom:10px;justify-content:center">
        <span><b style="color:var(--gn)">■</b> Entrate</span><span><b style="color:var(--rd)">■</b> Uscite</span>
      </div>
      <div class="vbars" id="mainBars"></div>
    </div>`;

  h+=`<div class="sec">💚 Fonti di Entrata</div><div class="card"><div id="donutE"></div></div>`;
  h+=`<div class="sec">💰 Ripartizione Spese</div><div class="card" id="macroCard"></div>`;
  h+=`<div class="sec">💸 Movimenti Top</div><div class="card" id="topTx"></div>`;

  el.innerHTML=h;
  mkMainBars();
  mkDonutE();
  mkMacro();
  mkTopTx();
}

function mkMainBars(){
  const el=document.getElementById('mainBars'); 
  const ms=D.ms.filter(m=>m.startsWith(cy+''));
  let mx=0; ms.forEach(m=>{mx=Math.max(mx,D.pm[m].e,D.pm[m].u)});
  el.innerHTML=ms.map(m=>{
    const mm=m.split('-')[1];
    const pe=(D.pm[m].e/mx*100);
    const pu=(D.pm[m].u/mx*100);
    return `<div class="vbar-g"><div class="vbar-pair">
        <div class="vbar" style="height:${pe}%;background:var(--gn)"></div>
        <div class="vbar" style="height:${pu}%;background:var(--rd);opacity:0.7"></div>
      </div><div class="vbar-lbl">${MN[+mm-1].substring(0,3)}</div></div>`;
  }).join('');
}

function mkDonutE(){
  const me=D.me[cy]||{};
  const sorted=Object.entries(me).sort((a,b)=>b[1]-a[1]);
  const tot=sorted.reduce((a,r)=>a+r[1],0);
  let svg='',off=0,leg='';
  sorted.forEach(([m,v])=>{const p=v/tot*100;const cl=(ME[m]||{}).color||'#888';
    svg+=`<circle cx="18" cy="18" r="15.9" fill="none" stroke="${cl}" stroke-width="3.5" stroke-dasharray="${p} ${100-p}" stroke-dashoffset="${-off}"/>`;off+=p;
    leg+=`<div style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:4px;color:var(--m1)"><div style="width:10px;height:10px;background:${cl};border-radius:2px"></div>${m}: <b style="color:var(--tx)">€ ${fm(v)}</b></div>`});
  document.getElementById('donutE').innerHTML=`<div class="donut-box">
    <div class="donut-ring"><svg viewBox="0 0 36 36" style="width:100%;height:100%;transform:rotate(-90deg)">${svg}</svg>
    <div class="donut-ctr" style="font-size:12px;font-weight:700">€ ${fm(tot)}</div></div>
    <div class="donut-leg">${leg}</div></div>`;
}

function mkMacro(){
  const mu=D.mu[cy]||{};
  const sorted=Object.entries(mu).sort((a,b)=>b[1]-a[1]);
  const mx=sorted.length ? sorted[0][1] : 1;
  document.getElementById('macroCard').innerHTML=sorted.map(([m,v])=>{
    const info=MM[m]||{icon:'?',label:m,color:'#888'};
    return `<div class="hbar-row">
      <div class="hbar-top"><span class="hbar-name">${info.icon} ${info.label}</span><span class="hbar-val">€ ${fm(v)}</span></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${v/mx*100}%;background:${info.color}"></div></div>
    </div>`;
  }).join('');
}

function mkTopTx(){
  const txs=D.tu[cy]||[];
  document.getElementById('topTx').innerHTML=txs.slice(0,10).map((t,i)=>`
    <div class="hbar-row tx-row" style="padding:12px 0">
      <div class="hbar-top" style="margin:0">
          <span class="hbar-name">${t.n}</span>
          <span class="hbar-val" style="color:var(--rd)">-€ ${fm(t.v)}</span>
      </div>
      <div style="font-size:12px;color:var(--m1)">${t.d}</div>
    </div>`).join('');
}

render();
</script></body></html>
