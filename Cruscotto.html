<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bilancio Familiare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
:root{--bg:#0b0d13;--c1:#13161f;--c2:#1a1e2a;--bd:#262b3a;--tx:#eaebf0;--m1:#7a7f94;
--gn:#2dd4a0;--gd:rgba(45,212,160,.12);--rd:#ef6b6b;--rdd:rgba(239,107,107,.12);
--bl:#5b9cf5;--bld:rgba(91,156,245,.12);--am:#f0b429;--amd:rgba(240,180,41,.12)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);
max-width:500px;margin:0 auto;padding:16px 16px 40px;line-height:1.4}

/* YEAR SELECTOR */
.yrs{display:flex;gap:6px;justify-content:center;margin:12px 0 20px;flex-wrap:wrap}
.yr{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:700;
border:2px solid var(--bd);background:var(--c1);color:var(--m1);cursor:pointer;transition:.2s}
.yr.a{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(99,102,241,.3)}

/* HERO CARD */
.hero{background:linear-gradient(145deg,#181c28,#1e2335);border:1px solid var(--bd);
border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:16px}
.hero-label{font-size:13px;color:var(--m1);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.hero-val{font-size:40px;font-weight:800;letter-spacing:-1.5px;margin:4px 0}
.hero-sub{font-size:14px;color:var(--m1);margin-bottom:6px}
.hero-badge{display:inline-block;padding:5px 14px;border-radius:12px;font-size:13px;font-weight:700}
.hero-badge.p{background:var(--gd);color:var(--gn)}.hero-badge.n{background:var(--rdd);color:var(--rd)}

/* 2-COL KPI */
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:var(--c1);border:1px solid var(--bd);border-radius:16px;padding:16px;text-align:center}
.kpi-label{font-size:11px;color:var(--m1);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:24px;font-weight:800;margin:4px 0;letter-spacing:-.5px}
.kpi-sub{font-size:12px;color:var(--m1)}

/* SECTION TITLE */
.sec{font-size:15px;font-weight:800;margin:28px 0 14px;padding-left:2px;
display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}

/* HORIZONTAL BAR (for categories) */
.hbar-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd)}
.hbar-row:last-child{border:none}
.hbar-icon{font-size:20px;width:32px;flex-shrink:0}
.hbar-body{flex:1;min-width:0}
.hbar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.hbar-name{font-size:14px;font-weight:600}
.hbar-val{font-size:14px;font-weight:700;white-space:nowrap;margin-left:8px}
.hbar-track{height:6px;background:var(--c2);border-radius:3px;overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* VERTICAL BARS (chart) */
.vchart{background:var(--c1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:16px}
.vchart-title{font-size:13px;font-weight:700;color:var(--m1);margin-bottom:4px}
.vchart-legend{display:flex;gap:14px;font-size:12px;color:var(--m1);margin-bottom:10px}
.vchart-legend span{display:flex;align-items:center;gap:4px}
.vchart-legend .sq{width:10px;height:10px;border-radius:3px}
.vbars{display:flex;align-items:flex-end;gap:3px;height:160px}
.vbar-g{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.vbar-pair{display:flex;gap:2px;align-items:flex-end;width:100%;justify-content:center;flex:1}
.vbar{border-radius:3px 3px 0 0;transition:height .5s cubic-bezier(.34,1.56,.64,1);min-width:5px;flex:1;max-width:16px}
.vbar-lbl{font-size:10px;color:var(--m1);font-weight:600}

/* CARD */
.card{background:var(--c1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:16px}
.card-t{font-size:13px;font-weight:700;color:var(--m1);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* TX ROW */
.tx{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);gap:10px}
.tx:last-child{border:none}
.tx-rank{min-width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:800;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-desc{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-date{font-size:11px;color:var(--m1)}
.tx-amt{font-size:15px;font-weight:800;white-space:nowrap}

/* DONUT */
.donut-box{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center}
.donut-ring{position:relative;width:140px;height:140px;flex-shrink:0}
.donut-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-ctr .dv{font-size:18px;font-weight:800}.donut-ctr .dl{font-size:10px;color:var(--m1)}
.donut-leg{display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px}
.donut-leg-i{display:flex;align-items:center;gap:6px;font-size:13px}
.donut-leg-d{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-leg-v{margin-left:auto;font-weight:700;font-size:13px}

/* YOY compare row */
.yoy-row{display:flex;gap:10px;margin-bottom:16px}
.yoy-item{flex:1;background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.yoy-label{font-size:10px;color:var(--m1);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.yoy-val{font-size:20px;font-weight:800;margin:3px 0}
.yoy-sub{font-size:11px;color:var(--m1)}
</style></head><body>

<div style="text-align:center;margin-bottom:4px">
<div style="font-size:20px;font-weight:800">💰 Bilancio Familiare</div>
</div>

<div id="content"></div>

let cy=D.ac;
const fm=n=>Math.round(n).toLocaleString('it-IT');
const fk=n=>Math.abs(n)>=10000?(n/1000).toFixed(1).replace('.',',')+'k':fm(n);
const pc=(a,b)=>b?((a-b)/Math.abs(b)*100).toFixed(1):'0';

function sel(y){cy=y;render()}

function render(){
  // Yr pills
  document.getElementById('yrs').innerHTML=D.anni.map(a=>

  const el=document.getElementById('content');
  const d=D.pya[cy]; if(!d){el.innerHTML='';return;}
  let h='';

  // === HERO: SALDO ===
  h+=`<div class="hero">
    <div class="hero-label">Saldo ${cy}</div>
    <div class="hero-val" style="color:${d.s>=0?'var(--bl)':'var(--rd)'}">€${fm(d.s)}</div>
    <div class="hero-sub">€${fm(d.s/d.nm)} al mese · ${d.nm} mesi</div>`;
  if(cy===D.ac && D.cmp){
    const ds=D.cmp.c.s-D.cmp.p.s;
    h+=`<div class="hero-badge ${ds>=0?'p':'n'}">${ds>=0?'▲ +':'▼ '}€${fm(Math.abs(ds))} vs ${D.cmp.ap}</div>`;
  }
  h+=`</div>`;

  // === KPI 2x2 ===
  h+=`<div class="kpi2">
    <div class="kpi"><div class="kpi-label">Entrate</div><div class="kpi-val" style="color:var(--gn)">€${fk(d.e)}</div><div class="kpi-sub">€${fk(d.e/d.nm)}/mese</div></div>
    <div class="kpi"><div class="kpi-label">Uscite</div><div class="kpi-val" style="color:var(--rd)">€${fk(d.u)}</div><div class="kpi-sub">€${fk(d.u/d.nm)}/mese</div></div>
  </div>`;

  // === CONFRONTO YoY ===
  if(cy===D.ac && D.cmp){
    const c=D.cmp,m=c.um;
    const dE=pc(c.c.e,c.p.e),dU=pc(c.c.u,c.p.u);
    h+=`<div class="sec">📊 Confronto Gen–${MN[m-1]} ${c.ac} vs ${c.ap}</div>`;
    h+=`<div class="yoy-row">
      <div class="yoy-item"><div class="yoy-label">Entrate</div><div class="yoy-val" style="color:${dE>=0?'var(--gn)':'var(--rd)'}">${dE>=0?'+':''}​${dE}%</div><div class="yoy-sub">€${fk(c.c.e)} vs €${fk(c.p.e)}</div></div>
      <div class="yoy-item"><div class="yoy-label">Uscite</div><div class="yoy-val" style="color:${dU<=0?'var(--gn)':'var(--rd)'}">${dU>0?'+':''}​${dU}%</div><div class="yoy-sub">€${fk(c.c.u)} vs €${fk(c.p.u)}</div></div>
      <div class="yoy-item"><div class="yoy-label">Saldo</div><div class="yoy-val" style="color:var(--bl)">€${fk(c.c.s)}</div><div class="yoy-sub">era €${fk(c.p.s)}</div></div>
    </div>`;

    // Confronto barre
    h+=`<div class="vchart"><div class="vchart-title">Entrate mese per mese</div>
      <div class="vchart-legend"><span><span class="sq" style="background:var(--gn)"></span>${c.ac}</span><span><span class="sq" style="background:#1a6b52"></span>${c.ap}</span></div>
      <div class="vbars" id="cmpE"></div></div>`;
    h+=`<div class="vchart"><div class="vchart-title">Uscite mese per mese</div>
      <div class="vchart-legend"><span><span class="sq" style="background:var(--rd)"></span>${c.ac}</span><span><span class="sq" style="background:#6b2a2a"></span>${c.ap}</span></div>
      <div class="vbars" id="cmpU"></div></div>`;
  }

  // === GRAFICO MENSILE ===
  h+=`<div class="sec">📈 Andamento ${cy}</div>`;
  h+=`<div class="vchart"><div class="vchart-title">Entrate vs Uscite</div>
    <div class="vchart-legend"><span><span class="sq" style="background:var(--gn)"></span>Entrate</span><span><span class="sq" style="background:var(--rd)"></span>Uscite</span></div>
    <div class="vbars" id="mainBars"></div></div>`;

  // === DOVE VANNO I SOLDI (macro uscite con barre orizzontali) ===
  h+=`<div class="sec">💰 Dove Vanno i Soldi</div>`;
  h+=`<div class="card" id="macroCard"></div>`;

  // === DONUT ENTRATE ===
  h+=`<div class="sec">💚 Da Dove Arrivano</div>`;

    mkCmpBars('cmpE','e',D.cmp.ac,D.cmp.ap,D.cmp.um,'var(--gn)','#1a6b52');
    mkCmpBars('cmpU','u',D.cmp.ac,D.cmp.ap,D.cmp.um,'var(--rd)','#6b2a2a');
  }
  mkMacro();
  mkDonutE();
  mkDetCat();
  mkTopTx();
}

function mkMainBars(){
  const el=document.getElementById('mainBars');if(!el)return;el.innerHTML='';
  const ms=D.ms.filter(m=>m.startsWith(cy+''));let mx=0;
  ms.forEach(m=>{mx=Math.max(mx,D.pm[m].e,D.pm[m].u)});
  ms.forEach((m,i)=>{
    const[y,mm]=m.split('-');
    const g=document.createElement('div');g.className='vbar-g';
    const bp=document.createElement('div');bp.className='vbar-pair';
    const be=document.createElement('div');be.className='vbar';be.style.cssText=`height:0%;background:var(--gn)`;
    const bu=document.createElement('div');bu.className='vbar';bu.style.cssText=`height:0%;background:var(--rd);opacity:.7`;
    bp.append(be,bu);
    const lb=document.createElement('div');lb.className='vbar-lbl';lb.textContent=MN[+mm-1].substring(0,3);
    g.append(bp,lb);el.append(g);
    setTimeout(()=>{be.style.height=(D.pm[m].e/mx*100)+'%';bu.style.height=(D.pm[m].u/mx*100)+'%'},30+i*25);
  });
}

function mkCmpBars(id,f,y1,y2,nm,c1,c2){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  let mx=0;
  for(let i=1;i<=nm;i++){const k1=y1+'-'+(i<10?'0'+i:i),k2=y2+'-'+(i<10?'0'+i:i);mx=Math.max(mx,(D.pm[k1]||{})[f]||0,(D.pm[k2]||{})[f]||0)}
  for(let i=1;i<=nm;i++){
    const k1=y1+'-'+(i<10?'0'+i:i),k2=y2+'-'+(i<10?'0'+i:i);
    const v1=(D.pm[k1]||{})[f]||0,v2=(D.pm[k2]||{})[f]||0;
    const g=document.createElement('div');g.className='vbar-g';
    const bp=document.createElement('div');bp.className='vbar-pair';
    const b1=document.createElement('div');b1.className='vbar';b1.style.cssText=`height:0%;background:${c2}`;
    const b2=document.createElement('div');b2.className='vbar';b2.style.cssText=`height:0%;background:${c1}`;
    bp.append(b1,b2);const lb=document.createElement('div');lb.className='vbar-lbl';lb.textContent=MN[i-1].substring(0,3);
    g.append(bp,lb);el.append(g);
    setTimeout(()=>{b1.style.height=(v2/mx*100)+'%';b2.style.height=(v1/mx*100)+'%'},30+i*20);
  }
}

function mkMacro(){
  const el=document.getElementById('macroCard');if(!el)return;
  const mu=D.mu[cy]||{};
  const totU=Object.values(mu).reduce((a,b)=>a+b,0);
  const sorted=MORD.filter(m=>mu[m]>0).map(m=>[m,mu[m]]).sort((a,b)=>b[1]-a[1]);
  const mx=sorted.length?sorted[0][1]:1;
  el.innerHTML=sorted.map(([m,v])=>{
    const info=MM[m]||{icon:'❓',label:m,color:'#888'};
    const pct=(v/totU*100).toFixed(1);
    const w=(v/mx*100).toFixed(0);
    return `<div class="hbar-row">
      <div class="hbar-icon">${info.icon}</div>
      <div class="hbar-body">
        <div class="hbar-top"><span class="hbar-name">${info.label}</span><span class="hbar-val" style="color:${info.color}">€${fk(v)} <span style="font-size:12px;color:var(--m1)">${pct}%</span></span></div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${info.color}"></div></div>
      </div></div>`;
  }).join('');
}

function mkDonutE(){
  const el=document.getElementById('donutE');if(!el)return;
  const me=D.me[cy]||{};
  const sorted=EORD.filter(m=>me[m]>0).map(m=>[m,me[m]]);
  const tot=sorted.reduce((a,r)=>a+r[1],0);
  let svg='',off=0;
  sorted.forEach(([m,v])=>{const p=v/tot*100;const cl=(ME[m]||{}).color||'#888';
    svg+=`<circle cx="18" cy="18" r="15.9" fill="none" stroke="${cl}" stroke-width="3.5" stroke-dasharray="${p} ${100-p}" stroke-dashoffset="${-off}"/>`;off+=p});
  const leg=sorted.map(([m,v])=>{const info=ME[m]||{icon:'',label:m,color:'#888'};const pct=(v/tot*100).toFixed(0);
    return `<div class="donut-leg-i"><div class="donut-leg-d" style="background:${info.color}"></div>${info.icon} ${info.label}<div class="donut-leg-v" style="color:${info.color}">€${fk(v)} (${pct}%)</div></div>`}).join('');
  // Dettaglio entrate sotto donut
  const ce=D.ce[cy]||{};
  const catSorted=Object.entries(ce).map(([k,v])=>[k,v.v,v.m]).sort((a,b)=>b[1]-a[1]);
  let catH=catSorted.slice(0,8).map(([c,v,m])=>{
    const cl=(ME[m]||{}).color||'#888';const pct=(v/tot*100).toFixed(1);
    return `<div class="hbar-row" style="padding:8px 0">
      <div class="hbar-icon" style="font-size:14px">•</div>
      <div class="hbar-body"><div class="hbar-top"><span class="hbar-name" style="font-size:13px">${c}</span>
        <span class="hbar-val" style="color:var(--gn);font-size:13px">€${fk(v)}</span></div></div></div>`;
  }).join('');
  el.innerHTML=`<div class="donut-box"><div class="donut-ring"><svg viewBox="0 0 36 36" style="width:100%;height:100%;transform:rotate(-90deg)">${svg}</svg><div class="donut-ctr"><div class="dv" style="color:var(--gn)">€${fk(tot)}</div><div class="dl">entrate</div></div></div><div class="donut-leg">${leg}</div></div>${catH}`;
}

function mkDetCat(){
  const el=document.getElementById('detCatU');if(!el)return;
  const cu=D.cu[cy]||{};
  const sorted=Object.entries(cu).map(([k,v])=>[k,v.v,v.m]).sort((a,b)=>b[1]-a[1]);
  const totU=sorted.reduce((a,r)=>a+r[1],0);
  const mx=sorted.length?sorted[0][1]:1;
  el.innerHTML=sorted.slice(0,15).map(([c,v,m])=>{
    const info=MM[m]||{icon:'',label:'',color:'#888'};
    const pct=(v/totU*100).toFixed(1);
    const w=(v/mx*100).toFixed(0);
    return `<div class="hbar-row" style="padding:8px 0">
      <div class="hbar-body">
        <div class="hbar-top"><span class="hbar-name" style="font-size:13px">${c}</span><span class="hbar-val" style="font-size:13px;color:${info.color}">€${fk(v)} <span style="font-size:11px;color:var(--m1)">${pct}%</span></span></div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${info.color}"></div></div>
      </div></div>`;
  }).join('');
}

function mkTopTx(){
  const el=document.getElementById('topTx');if(!el)return;
  const txs=D.tu[cy]||[];
  el.innerHTML=txs.slice(0,12).map((t,i)=>{
    const info=MM[t.mc]||{color:'#888'};
    const isTop3=i<3;
    const bg=isTop3?'var(--rdd)':'var(--c2)';
    const tc=isTop3?'var(--rd)':'var(--m1)';
    return `<div class="tx">
      <div class="tx-rank" style="background:${bg};color:${tc}">${i+1}</div>
      <div class="tx-body"><div class="tx-desc">${t.n}</div><div class="tx-date">${t.d} · ${t.c}</div></div>
      <div class="tx-amt" style="color:var(--rd)">€${fm(t.v)}</div>
    </div>`;
  }).join('');
}

render();
</script></body></html>
