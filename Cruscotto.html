<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Bilancio Familiare</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e14;--cd:#151821;--c2:#1c2030;--bd:#252a38;--tx:#e4e5ea;--mu:#6b7080;
--gn:#34d399;--gd:rgba(52,211,153,.12);--rd:#f87171;--rdd:rgba(248,113,113,.12);
--bl:#60a5fa;--bld:rgba(96,165,250,.12);--am:#fbbf24;--amd:rgba(251,191,36,.12);--ac:#818cf8;
--pk:#f472b6;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);
  padding:12px;max-width:480px;margin:0 auto;-webkit-tap-highlight-color:transparent;
  padding-bottom:72px}

/* === NAVIGATION === */
.nav{position:fixed;bottom:0;left:0;right:0;background:#111320;border-top:1px solid var(--bd);
  display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom,6px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;
  cursor:pointer;color:var(--mu);font-size:9px;font-weight:600;transition:color .2s;
  -webkit-tap-highlight-color:transparent;border:none;background:none}
.nav-btn.act{color:var(--ac)}
.nav-btn .ico{font-size:18px;line-height:1}

/* === HEADER === */
.hdr{text-align:center;margin-bottom:14px}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:6px}
.yr-pills{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.yr{padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;
  border:1px solid var(--bd);background:var(--cd);color:var(--mu);cursor:pointer}
.yr.a{background:var(--ac);color:#fff;border-color:var(--ac)}

/* === PAGES === */
.page{display:none}.page.show{display:block}

/* === CARDS === */
.card{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;color:var(--mu);font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:10px}

/* === BIG NUMBER === */
.big{text-align:center;padding:10px 0}
.big-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.big-val{font-size:32px;font-weight:700;letter-spacing:-1px;margin:2px 0}
.big-sub{font-size:11px;color:var(--mu)}
.big-delta{font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:4px}
.big-delta.p{background:var(--gd);color:var(--gn)}
.big-delta.n{background:var(--rdd);color:var(--rd)}

/* === MINI KPI ROW === */
.kpi3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.kpi3 .k{background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:10px;text-align:center}
.kpi3 .kl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.kpi3 .kv{font-size:16px;font-weight:700;margin:2px 0}
.kpi3 .ks{font-size:9px;color:var(--mu)}

/* === BARS === */
.bars{display:flex;align-items:flex-end;gap:2px;height:140px;padding:0 2px}
.bgrp{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.bpair{display:flex;gap:1px;align-items:flex-end;width:100%;justify-content:center;flex:1}
.br{border-radius:2px 2px 0 0;transition:height .5s cubic-bezier(.34,1.56,.64,1);min-width:4px;flex:1;max-width:14px}
.br.e{background:var(--gn)}.br.u{background:var(--rd);opacity:.7}
.br.ey{background:var(--gn)}.br.py{background:#166534}
.br.uy{background:var(--rd)}.br.puy{background:#7f1d1d}
.blbl{font-size:7px;color:var(--mu);white-space:nowrap}

/* === DONUT === */
.donut-box{display:flex;flex-direction:column;align-items:center;gap:10px}
.donut-ring{position:relative;width:120px;height:120px}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .dv{font-size:16px;font-weight:700}
.donut-center .ds{font-size:9px;color:var(--mu)}

/* === LEGEND / LIST === */
.lst{list-style:none}
.lst li{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);gap:8px}
.lst li:last-child{border:none}
.lst .dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.lst .nm{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lst .vl{font-size:12px;font-weight:600;white-space:nowrap}
.lst .pc{font-size:10px;color:var(--mu);min-width:36px;text-align:right}

/* === MACRO CHIPS === */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{padding:8px 12px;border-radius:10px;background:var(--c2);border:1px solid var(--bd);flex:1;min-width:calc(50% - 6px)}
.chip .cl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.chip .cv{font-size:15px;font-weight:700;margin-top:1px}

/* === SECTION DIVIDER === */
.divider{font-size:11px;font-weight:700;color:var(--ac);margin:16px 0 8px;
  padding-bottom:6px;border-bottom:1px solid var(--bd)}

/* === TOP TX === */
.tx-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd);gap:8px}
.tx-row:last-child{border:none}
.tx-rank{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;background:var(--rdd);color:var(--rd);flex-shrink:0}
.tx-desc{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-amt{font-size:12px;font-weight:700;color:var(--rd);white-space:nowrap}

/* Swipe hint */
.legend-bar{display:flex;justify-content:center;gap:10px;font-size:9px;color:var(--mu);margin:6px 0}
.legend-bar span{display:flex;align-items:center;gap:3px}
.legend-bar .sq{width:8px;height:8px;border-radius:2px;display:inline-block}
</style>
</head><body>

<!-- HEADER -->
<div class="hdr">
  <h1>💰 Bilancio Familiare</h1>
  <div class="yr-pills" id="yrPills"></div>
</div>

<!-- PAGES -->
<div class="page show" id="pgHome"></div>
<div class="page" id="pgChart"></div>
<div class="page" id="pgCat"></div>
<div class="page" id="pgTx"></div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <div class="nav-btn act" onclick="go('Home')"><span class="ico">📊</span>Sintesi</div>
  <div class="nav-btn" onclick="go('Chart')"><span class="ico">📈</span>Grafici</div>
  <div class="nav-btn" onclick="go('Cat')"><span class="ico">🏷️</span>Categorie</div>
  <div class="nav-btn" onclick="go('Tx')"><span class="ico">💸</span>Movimenti</div>
</nav>

  h+=`<div class="card big">
    <div class="big-label">Saldo netto ${cy}</div>
    <div class="big-val" style="color:${d.s>=0?'var(--bl)':'var(--rd)'}">€${fm(d.s)}</div>
    <div class="big-sub">€${fm(d.s/d.nm)}/mese · ${d.nm} mesi</div>`;

  // Confronto anno prec se anno corrente
  if(cy===D.ac && D.cmp){
    const c=D.cmp, ds=c.c.s-c.p.s;
    h+=`<div class="big-delta ${ds>=0?'p':'n'}">${ds>=0?'▲':'▼'} €${fm(Math.abs(ds))} vs ${c.ap}</div>`;
  }
  h+=`</div>`;

  // KPI 3 colonne
  h+=`<div class="kpi3">
    <div class="k"><div class="kl">Entrate</div><div class="kv" style="color:var(--gn)">€${fk(d.e)}</div><div class="ks">€${fk(d.e/d.nm)}/m</div></div>
    <div class="k"><div class="kl">Uscite</div><div class="kv" style="color:var(--rd)">€${fk(d.u)}</div><div class="ks">€${fk(d.u/d.nm)}/m</div></div>
    <div class="k"><div class="kl">Risparmio</div><div class="kv" style="color:var(--am)">${d.r}%</div><div class="ks">${d.r>=10?'✅':d.r>=0?'⚠️':'🔴'}</div></div>
  </div>`;

  // Confronto YoY se anno corrente
  if(cy===D.ac && D.cmp){
    const c=D.cmp, m=c.um;
    const dE=pc(c.c.e,c.p.e), dU=pc(c.c.u,c.p.u);
    h+=`<div class="divider">📊 vs ${c.ap} (Gen–${MN[m-1]})</div>`;
    h+=`<div class="kpi3">
      <div class="k"><div class="kl">Entrate</div><div class="kv" style="color:var(--gn)">${dE>=0?'+':''}${dE}%</div><div class="ks">€${fk(c.c.e)}</div></div>
      <div class="k"><div class="kl">Uscite</div><div class="kv" style="color:${dU<=0?'var(--gn)':'var(--rd)'}}">${dU>0?'+':''}${dU}%</div><div class="ks">€${fk(c.c.u)}</div></div>
      <div class="k"><div class="kl">Saldo</div><div class="kv" style="color:var(--bl)">€${fk(c.c.s)}</div><div class="ks">vs €${fk(c.p.s)}</div></div>
    </div>`;
  }

  // Macro chips uscite
  const mu=D.mu[cy]||{};
  const mOrder=['FISSE','VARIAB','FAMIGLIA','STRAORD','TRASF'];
  h+=`<div class="divider">💰 Dove vanno i soldi</div><div class="chips">`;
  mOrder.filter(m=>mu[m]>0).forEach(m=>{
    h+=`<div class="chip"><div class="cl">${ML[m]||m}</div><div class="cv" style="color:${MK[m]||'#fff'}">€${fk(mu[m])}</div></div>`;
  });
  h+=`</div>`;

  el.innerHTML=h;
}

// ==================== CHARTS ====================
function rChart(){
  const el=document.getElementById('pgChart');
  let h='';

  // Bar chart entrate vs uscite
  h+=`<div class="card"><div class="card-title">Entrate vs Uscite ${cy}</div>
    <div class="legend-bar"><span><span class="sq" style="background:var(--gn)"></span>Entrate</span><span><span class="sq" style="background:var(--rd)"></span>Uscite</span></div>
    <div class="bars" id="bc1"></div></div>`;

  // Confronto YoY
  if(cy===D.ac && D.cmp){
    const c=D.cmp;
    h+=`<div class="card"><div class="card-title">Entrate ${c.ac} vs ${c.ap}</div>
      <div class="legend-bar"><span><span class="sq" style="background:var(--gn)"></span>${c.ac}</span><span><span class="sq" style="background:#166534"></span>${c.ap}</span></div>
      <div class="bars" id="bcCE"></div></div>`;
    h+=`<div class="card"><div class="card-title">Uscite ${c.ac} vs ${c.ap}</div>
      <div class="legend-bar"><span><span class="sq" style="background:var(--rd)"></span>${c.ac}</span><span><span class="sq" style="background:#7f1d1d"></span>${c.ap}</span></div>
      <div class="bars" id="bcCU"></div></div>`;
  }

  el.innerHTML=h;
  mkBars('bc1',cy);
  if(cy===D.ac && D.cmp){
    mkCmpBars('bcCE','e',D.cmp.ac,D.cmp.ap,D.cmp.um,'var(--gn)','#166534');
    mkCmpBars('bcCU','u',D.cmp.ac,D.cmp.ap,D.cmp.um,'var(--rd)','#7f1d1d');
  }
}

function mkBars(id,yr){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  const ms=D.ms.filter(m=>m.startsWith(yr+''));let mx=0;
  ms.forEach(m=>{mx=Math.max(mx,D.pm[m].e,D.pm[m].u)});
  ms.forEach((m,i)=>{
    const[y,mm]=m.split('-');
    const g=document.createElement('div');g.className='bgrp';
    const bp=document.createElement('div');bp.className='bpair';
    const be=document.createElement('div');be.className='br e';be.style.height='0%';
    const bu=document.createElement('div');bu.className='br u';bu.style.height='0%';
    bp.append(be,bu);
    const lb=document.createElement('div');lb.className='blbl';lb.textContent=MN[+mm-1].substring(0,1);
    g.append(bp,lb);el.append(g);
    setTimeout(()=>{be.style.height=(D.pm[m].e/mx*100)+'%';bu.style.height=(D.pm[m].u/mx*100)+'%'},30+i*20);
  });
}

function mkCmpBars(id,f,y1,y2,nm,c1,c2){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  let mx=0;
  for(let i=1;i<=nm;i++){
    const k1=y1+'-'+(i<10?'0'+i:i),k2=y2+'-'+(i<10?'0'+i:i);
    mx=Math.max(mx,(D.pm[k1]||{})[f]||0,(D.pm[k2]||{})[f]||0);
  }
  for(let i=1;i<=nm;i++){
    const k1=y1+'-'+(i<10?'0'+i:i),k2=y2+'-'+(i<10?'0'+i:i);
    const v1=(D.pm[k1]||{})[f]||0,v2=(D.pm[k2]||{})[f]||0;
    const g=document.createElement('div');g.className='bgrp';
    const bp=document.createElement('div');bp.className='bpair';
    const b1=document.createElement('div');b1.className='br';b1.style.cssText=`height:0%;background:${c2}`;
    const b2=document.createElement('div');b2.className='br';b2.style.cssText=`height:0%;background:${c1}`;
    bp.append(b1,b2);
    const lb=document.createElement('div');lb.className='blbl';lb.textContent=MN[i-1].substring(0,1);
    g.append(bp,lb);el.append(g);
    setTimeout(()=>{b1.style.height=(v2/mx*100)+'%';b2.style.height=(v1/mx*100)+'%'},30+i*20);
  }
}

// ==================== CATEGORIES ====================
function rCat(){
  const el=document.getElementById('pgCat');
  let h='';

  // Donut uscite
  h+=`<div class="card"><div class="card-title">🍩 Uscite per categoria</div><div class="donut-box" id="dnU"></div></div>`;

  // Top cat uscite list
  h+=`<div class="card"><div class="card-title">🔝 Categorie uscite</div><ul class="lst" id="lstU"></ul></div>`;

  // Donut entrate
  h+=`<div class="card"><div class="card-title">🍩 Entrate per fonte</div><div class="donut-box" id="dnE"></div></div>`;

  // Top cat entrate list
  h+=`<div class="card"><div class="card-title">💰 Fonti entrate</div><ul class="lst" id="lstE"></ul></div>`;

  el.innerHTML=h;
  mkDonut('dnU',D.cu[cy]||{},false);
  mkDonut('dnE',D.ce[cy]||{},true);
  mkCatList('lstU',D.cu[cy]||{},false);
  mkCatList('lstE',D.ce[cy]||{},true);
}

function mkDonut(id,cats,isE){
  const el=document.getElementById(id);if(!el)return;
  const s=Object.entries(cats).map(([k,v])=>[k,v.v,v.m]).sort((a,b)=>b[1]-a[1]);
  const tot=s.reduce((x,r)=>x+r[1],0);
  let sv='',off=0;
  s.forEach(([c,v,m],i)=>{const p=v/tot*100;const cl=MK[m]||CC[i%CC.length];
    sv+=`<circle cx="18" cy="18" r="15.9" fill="none" stroke="${cl}" stroke-width="3.5" stroke-dasharray="${p} ${100-p}" stroke-dashoffset="${-off}"/>`;off+=p});
  const vc=isE?'var(--gn)':'var(--tx)';
  el.innerHTML=`<div class="donut-ring"><svg viewBox="0 0 36 36" style="width:100%;height:100%;transform:rotate(-90deg)">${sv}</svg><div class="donut-center"><div class="dv" style="color:${vc}">€${fk(tot)}</div><div class="ds">${isE?'entrate':'uscite'}</div></div></div>`;
}

function mkCatList(id,cats,isE){
  const el=document.getElementById(id);if(!el)return;
  const s=Object.entries(cats).map(([k,v])=>[k,v.v,v.m]).sort((a,b)=>b[1]-a[1]);
  const tot=s.reduce((x,r)=>x+r[1],0);
  el.innerHTML=s.slice(0,10).map(([c,v,m],i)=>{
    const p=(v/tot*100).toFixed(1);
    const cl=MK[m]||CC[i%CC.length];
    const vc=isE?'color:var(--gn)':'';
    return `<li><span class="dot" style="background:${cl}"></span><span class="nm">${c}</span><span class="vl" style="${vc}">€${fk(v)}</span><span class="pc">${p}%</span></li>`;
  }).join('');
}

// ==================== TRANSACTIONS ====================
function rTx(){
  const el=document.getElementById('pgTx');
  let h=`<div class="card"><div class="card-title">💸 Top 10 uscite ${cy}</div>`;
  const txs=D.tu[cy]||[];
  txs.slice(0,10).forEach((t,i)=>{
    h+=`<div class="tx-row"><div class="tx-rank">${i+1}</div><div class="tx-desc">${t.d} ${t.n}</div><div class="tx-amt">€${fm(t.v)}</div></div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

render();
</script></body></html>
