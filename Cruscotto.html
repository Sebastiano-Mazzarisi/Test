.tc{display:flex;align-items:center;gap:6px;flex:1;min-width:0}

.ta{font-weight:600;white-space:nowrap;margin-left:5px}

.pf{height:100%;border-radius:2px}

  const dE=pc(cu.e,pr.e),dU=pc(cu.u,pr.u),dS=cu.s-pr.s;
  el.innerHTML=`
  <div class="st">📊 ${c.ac} vs ${c.ap} — stesso periodo (Gen–${MN[m-1]})</div>
  <div class="kr">
    <div class="k"><div class="ki" style="background:var(--gd);color:var(--gn)">↓</div><div class="kl">Entrate ${c.ac}</div><div class="kv" style="color:var(--gn)">€${fm(cu.e)}</div><div class="ks">vs €${fm(pr.e)} (${c.ap})</div><div class="kd ${dE>=0?'p':'n'}">${dE>=0?'▲':'▼'}${Math.abs(dE)}%</div></div>
    <div class="k"><div class="ki" style="background:var(--rdd);color:var(--rd)">↑</div><div class="kl">Uscite ${c.ac}</div><div class="kv" style="color:var(--rd)">€${fm(cu.u)}</div><div class="ks">vs €${fm(pr.u)} (${c.ap})</div><div class="kd ${dU<=0?'p':'n'}">${dU<=0?'▼':'▲'}${Math.abs(dU)}%</div></div>
    <div class="k"><div class="ki" style="background:var(--bld);color:var(--bl)">≡</div><div class="kl">Saldo ${c.ac}</div><div class="kv" style="color:${cu.s>=0?'var(--bl)':'var(--rd)'}">€${fm(cu.s)}</div><div class="ks">vs €${fm(pr.s)} (${c.ap})</div><div class="kd ${dS>=0?'p':'n'}">${dS>=0?'▲':'▼'}€${fm(Math.abs(dS))}</div></div>
    <div class="k"><div class="ki" style="background:var(--amd);color:var(--am)">📈</div><div class="kl">Media mensile</div><div class="kv" style="color:var(--am)">€${fm(cu.s/m)}<span style="font-size:10px;color:var(--mu)">/m</span></div><div class="ks">vs €${fm(pr.s/m)}/m (${c.ap})</div></div>
  </div>
  <div class="g2" style="margin-top:8px">
    <div class="c"><h3>↓ Entrate: ${c.ac} <span style="color:var(--gn)">■</span> vs ${c.ap} <span style="color:#166534">■</span></h3><div class="bw" id="cE"></div></div>
    <div class="c"><h3>↑ Uscite: ${c.ac} <span style="color:var(--rd)">■</span> vs ${c.ap} <span style="color:#7f1d1d">■</span></h3><div class="bw" id="cU"></div></div>
  </div>`;
  cBar('cE','e',c.ac,c.ap,m,'var(--gn)','#166534');
  cBar('cU','u',c.ac,c.ap,m,'var(--rd)','#7f1d1d');
}

function cBar(id,f,y1,y2,nm,c1,c2){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  let mx=0;
  for(let i=1;i<=nm;i++){const k1=y1+'-'+(i<10?'0'+i:i),k2=y2+'-'+(i<10?'0'+i:i);mx=Math.max(mx,(D.pm[k1]||{})[f]||0,(D.pm[k2]||{})[f]||0)}
  for(let i=1;i<=nm;i++){
    const k1=y1+'-'+(i<10?'0'+i:i),k2=y2+'-'+(i<10?'0'+i:i);
    const v1=(D.pm[k1]||{})[f]||0,v2=(D.pm[k2]||{})[f]||0;
    const g=document.createElement('div');g.className='bg';
    const bp=document.createElement('div');bp.className='bp';
    const b1=document.createElement('div');b1.className='b';b1.style.cssText=`height:0%;background:${c2};width:10px`;
    const b2=document.createElement('div');b2.className='b';b2.style.cssText=`height:0%;background:${c1};width:10px`;
    [b1,b2].forEach(b=>{b.onmousemove=e=>sh(e,`<b>${MN[i-1]}</b><br>${y2}: €${fm(v2)}<br>${y1}: €${fm(v1)}<br>Δ ${v1>=v2?'+':''}€${fm(v1-v2)}`);b.onmouseleave=hi});
    bp.append(b1,b2);const lb=document.createElement('div');lb.className='bl';lb.textContent=MN[i-1];
    g.append(bp,lb);el.append(g);
    setTimeout(()=>{b1.style.height=(v2/mx*100)+'%';b2.style.height=(v1/mx*100)+'%'},30+i*20);
  }
}

// === KPI ANNO ===
function rKpi(){
  const d=D.pya[cy];if(!d)return;
  document.getElementById('s2').innerHTML=`
  <div class="st">📋 Riepilogo ${cy}</div>
  <div class="kr">
    <div class="k"><div class="ki" style="background:var(--gd);color:var(--gn)">↓</div><div class="kl">Entrate</div><div class="kv" style="color:var(--gn)">€${fm(d.e)}</div><div class="ks">€${fm(d.e/d.nm)}/m (${d.nm}m)</div></div>
    <div class="k"><div class="ki" style="background:var(--rdd);color:var(--rd)">↑</div><div class="kl">Uscite</div><div class="kv" style="color:var(--rd)">€${fm(d.u)}</div><div class="ks">€${fm(d.u/d.nm)}/m</div></div>
    <div class="k"><div class="ki" style="background:var(--bld);color:var(--bl)">≡</div><div class="kl">Saldo</div><div class="kv" style="color:${d.s>=0?'var(--bl)':'var(--rd)'}">€${fm(d.s)}</div><div class="ks">€${fm(d.s/d.nm)}/m</div></div>
    <div class="k"><div class="ki" style="background:var(--amd);color:var(--am)">%</div><div class="kl">Risparmio</div><div class="kv" style="color:var(--am)">${d.r}%</div><div class="ks">${d.r>=10?'✅ Ok':d.r>=0?'⚠️ Equilibrio':'🔴 Deficit'}</div></div>
  </div>
  <div class="mg" id="mgr"></div>`;
  const mu=D.mu[cy]||{};
  document.getElementById('mgr').innerHTML=['FISSE','VARIAB','FAMIGLIA','STRAORD','TRASF'].filter(m=>mu[m]>0).map(m=>
    `<div class="mb"><div class="ml">${ML[m]||m}</div><div class="mv" style="color:${MK[m]||'#fff'}">€${fk(mu[m])}</div></div>`).join('');
}

// === GRAFICI ===
function rCh(){
  document.getElementById('s3').innerHTML=`<div class="st">📊 Grafici ${cy}</div>
  <div class="g2"><div class="c"><h3>Entrate vs Uscite Mensili</h3><div class="bw" id="bc"></div></div>
  <div class="c"><h3>🍩 Composizione Uscite</h3><div class="dw" id="dn"></div></div></div>`;
  // Bars
  const el=document.getElementById('bc');el.innerHTML='';
  const ms=D.ms.filter(m=>m.startsWith(cy+''));let mx=0;
  ms.forEach(m=>{mx=Math.max(mx,D.pm[m].e,D.pm[m].u)});
  ms.forEach((m,i)=>{
    const[y,mm]=m.split('-'),en=D.pm[m].e,us=D.pm[m].u;
    const g=document.createElement('div');g.className='bg';const bp=document.createElement('div');bp.className='bp';
    const be=document.createElement('div');be.className='b e';be.style.height='0%';
    const bu=document.createElement('div');bu.className='b u';bu.style.height='0%';
    [be,bu].forEach(b=>{b.onmousemove=e=>sh(e,`<b>${MN[+mm-1]} ${y}</b><br><span style="color:var(--gn)">↓€${fm(en)}</span><br><span style="color:var(--rd)">↑€${fm(us)}</span><br><span style="color:var(--bl)">≡€${fm(en-us)}</span>`);b.onmouseleave=hi});
    bp.append(be,bu);const lb=document.createElement('div');lb.className='bl';lb.textContent=MN[+mm-1];
    g.append(bp,lb);el.append(g);
    setTimeout(()=>{be.style.height=(en/mx*100)+'%';bu.style.height=(us/mx*100)+'%'},30+i*25);
  });
  // Donut
  mkDn('dn',D.cu[cy]||{},false);
}

function mkDn(id,cats,isE){
  const el=document.getElementById(id);if(!el)return;
  const s=Object.entries(cats).map(([k,v])=>[k,v.v,v.m]).sort((a,b)=>b[1]-a[1]);
  const tot=s.reduce((x,r)=>x+r[1],0);
  let sv='',off=0;
  s.forEach(([c,v,m],i)=>{const p=v/tot*100;const cl=MK[m]||CC[i%CC.length];
    sv+=`<circle cx="18" cy="18" r="15.9" fill="none" stroke="${cl}" stroke-width="3" stroke-dasharray="${p} ${100-p}" stroke-dashoffset="${-off}"/>`;off+=p});
  const lg=s.slice(0,12).map(([c,v,m],i)=>{const p=(v/tot*100).toFixed(1);const cl=MK[m]||CC[i%CC.length];
    return `<div class="li"><span class="ll"><span class="ld" style="background:${cl}"></span>${c}</span><span class="lp">€${fk(v)} (${p}%)</span></div>`}).join('');
  const vc=isE?'var(--gn)':'var(--tx)';
  el.innerHTML=`<div class="ds"><svg viewBox="0 0 36 36" style="width:100%;height:100%;transform:rotate(-90deg)">${sv}</svg><div class="dc"><div class="da" style="color:${vc}">€${fk(tot)}</div><div class="dl">${isE?'entrate':'uscite'}</div></div></div><div class="lg">${lg}</div>`;
}

// === DETTAGLI ===
function rDet(){
  document.getElementById('s4').innerHTML=`<div class="st">🔍 Dettaglio ${cy}</div>
  <div class="ge"><div class="c"><h3>🔝 Top Categorie Uscite</h3><ul class="tl" id="tcu"></ul></div>
  <div class="c"><h3>💰 Fonti di Entrata</h3><ul class="tl" id="tce"></ul></div></div>
  <div class="ge" style="margin-top:8px"><div class="c"><h3>💸 Top Transazioni Uscita</h3><ul class="tl" id="ttx"></ul></div>
  <div class="c"><h3>🍩 Composizione Entrate</h3><div class="dw" id="dnE"></div></div></div>`;
  mkList('tcu',D.cu[cy]||{},false);
  mkList('tce',D.ce[cy]||{},true);
  // Top tx
  const txs=D.tu[cy]||[];
  document.getElementById('ttx').innerHTML=txs.slice(0,10).map((t,i)=>
    `<li><span class="tc"><span class="ti" style="background:var(--rdd);color:var(--rd)">${i+1}</span><span class="tn" title="${t.n}">${t.d} ${t.n}</span></span><span class="ta" style="color:var(--rd)">€${fm(t.v)}</span></li>`).join('');
  mkDn('dnE',D.ce[cy]||{},true);
}

function mkList(id,cats,isE){
  const el=document.getElementById(id);if(!el)return;
  const s=Object.entries(cats).map(([k,v])=>[k,v.v,v.m]).sort((a,b)=>b[1]-a[1]);
  const mx=s.length?s[0][1]:1;
  el.innerHTML=s.slice(0,10).map(([c,v,m],i)=>{
    const p=(v/mx*100).toFixed(0),cl=MK[m]||CC[i%CC.length];
    const vc=isE?'color:var(--gn)':'';
    return `<li><span class="tc"><span class="ti" style="background:${cl}22;color:${cl}">${c.split(' ')[0]}</span><span class="tn">${c.replace(/^\S+\s/,'')}</span></span><span class="ta" style="${vc}">€${fk(v)}</span><span class="pb"><span class="pf" style="width:${p}%;background:${cl}"></span></span></li>`}).join('');
}

rAll();
</script></body></html>
