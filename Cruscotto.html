<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bilancio Familiare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
:root{
    --bg:#1e293b; --c1:#334155; --c2:#475569; --bd:#475569;
    --tx:#f1f5f9; --m1:#cbd5e1; --gn:#34d399; --rd:#f87171; --bl:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);max-width:600px;margin:0 auto;padding-bottom:60px;scroll-behavior:smooth}

.sticky-nav {position:sticky;z-index:100;background:rgba(30,41,59,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd)}
#yr-nav {top:0;padding:10px 16px 5px}
#mn-nav {top:54px;padding:5px 16px 10px}

.nav-row {display:flex;align-items:center;justify-content:space-between;gap:10px}
.btns-wrap {display:flex; flex-direction: row; gap:6px; overflow:hidden; flex:1; justify-content:center; align-items: center;}
.yr {padding:8px 14px;border-radius:20px;font-size:15px;font-weight:700;background:var(--c2);color:var(--m1);cursor:pointer;border:1px solid var(--bd);white-space:nowrap}
.yr.a {background:var(--bl);color:#fff;border-color:var(--bl)}
.nav-btn {background:transparent;border:none;color:var(--bl);font-size:24px;font-weight:800;cursor:pointer;padding:0 8px}

.hero{margin:16px;background:linear-gradient(135deg, var(--c1), var(--c2));border:1px solid var(--bd);border-radius:20px;padding:24px;text-align:center;box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
.hero-val{font-size:40px;font-weight:800;margin:5px 0;letter-spacing:-1px}
.hero-sub{font-size:14px;color:var(--m1)}
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px 16px}
.kpi{background:var(--c1);border:1px solid var(--bd);border-radius:20px;padding:20px 10px;text-align:center;box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
.kpi-val{font-size:26px;font-weight:800;margin:5px 0}
.kpi-label{font-size:12px;color:var(--m1);font-weight:600;text-transform:uppercase}
.tbl-card {margin:16px;background:var(--c1);border:1px solid var(--bd);border-radius:16px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
.tbl {width:100%;border-collapse:collapse}
.tbl th {background:var(--c2);color:var(--tx);font-weight:600;padding:8px 10px;text-align:right;font-size:13px;text-transform:uppercase}
.tbl td {padding:10px 12px;text-align:right;border-bottom:1px solid var(--bd);font-size:16px;font-weight:500;font-variant-numeric:tabular-nums}
.riga-totale td {border-bottom:none;font-weight:800;background:rgba(255,255,255,0.05)}
.tbl-m {text-align:left!important;font-weight:700;color:var(--m1); vertical-align: top; white-space: nowrap; border-bottom: none !important;}
.sec{font-size:18px;font-weight:800;margin:30px 16px 10px;color:var(--tx);padding-left:4px}
</style></head><body>

<div class="sticky-nav" id="yr-nav">
    <div class="nav-row">
        <button class="nav-btn" onclick="moveYr(-1)">❮</button>
        <div class="btns-wrap" id="yrs"></div>
        <button class="nav-btn" onclick="moveYr(1)">❯</button>
    </div>
</div>

<div class="sticky-nav" id="mn-nav">
    <div class="nav-row">
        <button class="nav-btn" onclick="moveMn(-1)">❮</button>
        <div class="btns-wrap" id="m-btns"></div>
        <button class="nav-btn" onclick="moveMn(1)">❯</button>
    </div>
</div>

<div id="content"></div>
<div id="month-kpi"></div>

    const dayLabel = DOW[dt.getDay() === 0 ? 6 : dt.getDay()-1] + '-' + d.padStart(2,'0');
    h_sum += `<tr id="sum-day-${d}" style="cursor:pointer" onclick="scrollToDetailDay(${d})">
      <td class="tbl-m" style="border-bottom: 1px solid var(--bd) !important;">${dayLabel}</td>
      <td style="color:var(--gn)">${dv.e ? '€ '+fm(dv.e) : '-'}</td>
      <td style="color:var(--rd)">${dv.u ? '€ '+fm(dv.u) : '-'}</td></tr>`;
  });
  h_sum += `</tbody></table></div>`;

  let h_det = `<div class="sec">🔍 ${titoloMese} ${y} - Descrizione e importo</div>
  <div class="tbl-card"><table class="tbl">
    <thead><tr><th class="tbl-m" style="text-align:left">Giorno</th><th style="text-align:left;padding-left:8px">Descrizione</th><th>Importo</th></tr></thead>
    <tbody>`;
  
  let lastDay = -1;
  txlist.forEach((t, index) => {
    const imp = t.e > 0 ? t.e : -t.u;
    const col = imp >= 0 ? 'var(--gn)' : 'var(--rd)';
    const dt = new Date(y, m-1, t.day);
    const dayLabel = t.day !== lastDay ? (DOW[dt.getDay() === 0 ? 6 : dt.getDay()-1] + '-' + t.day.toString().padStart(2,'0')) : '';
    const rowId = t.day !== lastDay ? `id="det-day-${t.day}"` : '';
    lastDay = t.day;
    const isLastOfGroup = (index === txlist.length - 1) || (txlist[index+1].day !== t.day);
    const borderStyle = isLastOfGroup ? '1px solid var(--bd)' : 'none';

    h_det += `<tr ${rowId} style="cursor:pointer" onclick="scrollToSummaryDay(${t.day})">
      <td class="tbl-m" style="border-bottom: ${borderStyle} !important;">${dayLabel}</td>
      <td style="text-align:left;padding-left:8px;font-size:14px;color:var(--m1); border-bottom: 1px solid var(--bd);">${t.si}</td>
      <td style="color:${col};font-weight:700; border-bottom: 1px solid var(--bd);">${imp>0?'+':''}${fm(imp)}</td>
    </tr>`;
  });

  h_det += `<tr class="riga-totale"><td class="tbl-m" style="border-bottom: none !important;"></td>
      <td style="text-align:left;padding-left:8px;font-size:16px;color:${saldo>=0?'var(--gn)':'var(--rd)'}">Saldo mensile: € ${fm(saldo)}</td>
      <td></td></tr></tbody></table></div>`;
      
  document.getElementById('month-kpi').innerHTML = h_kpi;
  document.getElementById('month-details').innerHTML = h_sum + h_det;

  if (doScroll) {
    setTimeout(() => {
        const el = document.getElementById('month-kpi');
        if (el) {
            const offset = 115;
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = el.getBoundingClientRect().top;
            window.scrollTo({ top: (elementRect - bodyRect) - offset, behavior: 'smooth' });
        }
    }, 50);
  }
}
render();
</script></body></html>
